  <script type='text/javascript'>
//==============================================================================
// Initialization
//==============================================================================

indexing = true;
dataindexing = false;
ruleindexing = true;

var manager = 'manager';
var players = 'anonymous';
var game = 'buttonsandlights';
var startclock = 10;
var playclock = 10;

var library = [];
var ruleset = [];
var roles = [];
var state = [];
var move = nil;
var errors = {};

var player = 'anonymous';
var actives = [];
var messageid = 0;
var waiter = 'load';
var timekeeper;

//==============================================================================

function doinitialize ()
 {window.addEventListener("storage",handlestorage,false);
  definerules(library,readdata(document.getElementById('library').value));
  ruleset = readdata(document.getElementById('ruleset').value);
  roles = findroles(library);
  state = findinits(library);
  errors = createerrors();
  createscoreboard();
  showstate(state);
  showscore(state);
  return true}

function reinitialize ()
 {state = findinits(library);
  errors = createerrors();
  createscoreboard();
  showstate(state);
  showscore(state);
  return true}

function createerrors ()
 {var errors = {};
  for (var i=0; i<roles.length; i++)
      {errors[roles[i]] = 0};
  return errors}

function createscoreboard ()
 {var scoreboard = document.getElementById('scoreboard');
  var n = scoreboard.rows.length;
  for (var i=0; i<n; i++) {scoreboard.deleteRow(0)};

  var row = scoreboard.insertRow(0);
  cell = row.insertCell(0);
  cell.innerHTML = 'Roles';
  cell.setAttribute('width','120');
  cell.setAttribute('align','center');
  cell.setAttribute('style','font-weight:bold');
  cell.setAttribute('bgcolor','#f4f8f8');
  for (var i=0; i<roles.length; i++)
      {cell = row.insertCell(i+1);
       cell.innerHTML = roles[i];
       cell.setAttribute('width','120');
       cell.setAttribute('align','center');
       cell.setAttribute('style','font-weight:bold');
       cell.setAttribute('bgcolor','#f4f8f8')};

  row = scoreboard.insertRow(1);
  cell = row.insertCell(0);
  cell.innerHTML = 'Players';
  cell.setAttribute('style','font-weight:bold');
  cell.setAttribute('bgcolor','#f4f8f8');
  cell.setAttribute('align','center');
  for (var i=0; i<roles.length; i++)
      {cell = row.insertCell(i+1);
       cell.setAttribute('align','center');
       cell.setAttribute('bgcolor','#f4f8f8');
       cell.setAttribute('onclick','changeplayer(this)');
       cell.style.cursor = 'pointer';
       cell.innerHTML = players[i] ? players[i] : 'anonymous'};

  row = scoreboard.insertRow(2);
  cell = row.insertCell(0);
  cell.innerHTML = 'Score';
  cell.setAttribute('style','font-weight:bold');
  cell.setAttribute('bgcolor','#f4f8f8');
  cell.setAttribute('align','center');
  for (var i=0; i<roles.length; i++)
      {cell = row.insertCell(i+1);
       cell.setAttribute('align','center');
       cell.innerHTML = '&nbsp;'};

  row = scoreboard.insertRow(3);
  cell = row.insertCell(0);
  cell.innerHTML = 'Errors';
  cell.setAttribute('style','font-weight:bold');
  cell.setAttribute('bgcolor','#f4f8f8');
  cell.setAttribute('align','center');
  for (var i=0; i<roles.length; i++)
      {cell = row.insertCell(i+1);
       cell.setAttribute('align','center');
       cell.innerHTML = '0'};

  return true}

function changeplayer (node)
 {var scoreboard = document.getElementById('scoreboard');
  var row = scoreboard.rows[1];
  for (var i=1; i<row.cells.length; i++)
      {if (row.cells[i]===node)
          {var newplayer = prompt("Player name:");
           players[i-1] = newplayer;
           row.cells[i].innerHTML = newplayer;
           return true}};
  return false}

function getrole (player)
 {for (var i=0; i<players.length; i++)
      {if (player===players[i]) {return roles[i]}};
  return 'robot'}

function getplayer (role)
 {for (var i=0; i<roles.length; i++)
      {if (role===roles[i]) {return players[i]}};
  return 'anonymous'}

//==============================================================================
// Display
//==============================================================================

function showstate (state)
 {var stateholder = document.getElementById('stateholder');
  var n = stateholder.childNodes.length;
  for (var i=0; i<n; i++) {stateholder.removeChild(stateholder.childNodes[0])};
  stateholder.appendChild(renderstate(state));
  return true}

function showscore (state)
 {var scoreboard = document.getElementById('scoreboard');
  var row = scoreboard.rows[2];
  for (var i=0; i<roles.length; i++)
      {row.cells[i+1].innerHTML = findreward(roles[i],state,library)};
  return true}

function showerrors ()
 {var scoreboard = document.getElementById('scoreboard');
  var row = scoreboard.rows[3];
  for (var i=0; i<roles.length; i++)
      {row.cells[i+1].innerHTML = errors[roles[i]]};
  return true}

//==============================================================================
// Controls
//==============================================================================

function dopinger ()
 {document.getElementById('pinger').disabled = false;
  document.getElementById('starter').disabled = false;
  document.getElementById('aborter').disabled = true;
  doping();
  return true}

function dorunner ()
 {document.getElementById('pinger').disabled = true;
  document.getElementById('starter').disabled = true;
  document.getElementById('aborter').disabled = false;
  dostart();
  return true}

function doaborter ()
 {document.getElementById('pinger').disabled = false;
  document.getElementById('starter').disabled = false;
  document.getElementById('aborter').disabled = true;
  doabort();
  return true}

//==============================================================================
// Operations
//==============================================================================

function doping ()
 {waiter = 'ping';
  messageid++;
  actives = [];
  for (var i=0; i<roles.length; i++)
      {send(seq('ping'),players[i])};
  timekeeper = beginclock(5);
  return true}

function handleping (sender,message)
 {if (message!=='ready') {return false};
  actives = adjoin(getrole(sender),actives);
  if (actives.length===roles.length) {clearclock(); return endping()};
  return true}

function endping ()
 {waiter = 'load';
  alert(actives.length + "/" + roles.length + " ready.");
  return true}

//==============================================================================

function dostart ()
 {waiter = 'start';
  messageid++;
  reinitialize();
  actives = [];
  move = nil;
  var rules = seq('ruleset').concat(ruleset);
  var sc = stringize(startclock);
  var pc = stringize(playclock);
  for (var i=0; i<roles.length; i++)
      {var message = grind(seq('start',roles[i],rules,sc,pc));
       send(message,players[i])};
  timekeeper = beginclock(startclock);
  return true}

function handlestart (sender,message)
 {if (message!=='ready') {return false};
  actives = adjoin(getrole(sender),actives);
  if (actives.length===roles.length) {clearclock(); return endstart()};
  return true}

function endstart ()
 {waiter = 'load';
  setTimeout(doplay,1000);
  return true}

//==============================================================================

function doplay ()
 {waiter = 'play';
  messageid++;
  for (var i=0; i<roles.length; i++)
      {var message = grind(seq('play',move));
       send(message,players[i])};
  timekeeper = beginclock(playclock);
  return true}

function handleplay (sender,message)
 {var role = getrole(sender);
  if (role!==findcontrol(state,library)) {return false};
  move = message;
  if (!findlegalp(move,state,library)) {playerror(role)};
  clearclock();
  endplay();
  return true};

function playerror (role)
 {var actions=findlegals(state,library);
  var ind = Math.floor(Math.random()*actions.length);
  var newmove = actions[ind];
  errors[role] = errors[role]+1;
  console.log("Error: " + move + ".  Playing " + grind(newmove));
  move = newmove;
  return true}

function playdefault ()
 {var role = findcontrol(state,library);
  var actions=findlegals(state,library);
  var ind = Math.floor(Math.random()*actions.length);
  move = actions[ind];
  errors[role] = errors[role]+1;
  console.log("Timeout.  Playing " + grind(move));
  endplay();
  return true}

function endplay ()
 {waiter = 'load';
  state = simulate(move,state,library);
  showstate(state);
  showscore(state);
  showerrors();
  if (findterminalp(state,library)) {dostop(); return true};
  setTimeout(doplay,1000);
  return true}

//==============================================================================

function dostop ()
 {waiter = 'load';
  messageid++;
  var message = grind(seq('stop',move));
  for (var i=0; i<roles.length; i++)
      {send(message,players[i])};
  document.getElementById('pinger').disabled = false;
  document.getElementById('starter').disabled = false;
  document.getElementById('aborter').disabled = true;
  return false}

//==============================================================================

function doabort ()
 {waiter = 'load';
  messageid++;
  var message = grind(seq('abort'));
  for (var i=0; i<roles.length; i++)
      {send(message,players[i])};
  return true}

//==============================================================================
// Timer
//==============================================================================

function beginclock (n)
 {if (n===Infinity) {return false};
  document.getElementById('timer').value = n;
  return setInterval(updateclock,1000)}

function updateclock ()
 {var timer = document.getElementById('timer');
  var time = timer.value - 1;
  timer.value = time;
  if (time<=0) {endclock()};
  return true}

function endclock ()
 {clearclock();
  if (waiter==='ping') {return endping()};
  if (waiter==='start') {return endstart()};
  if (waiter==='play') {return playdefault()};
  return true}

function clearclock ()
 {document.getElementById('timer').value = '';
  clearInterval(timekeeper);
  return true}

//==============================================================================
// Basics
//==============================================================================

function findroles (rules)
 {return compfinds('R',seq('role','R'),seq(),rules)}

function findbases (rules)
 {return compfinds('P',seq('base','P'),seq(),rules)}

function findactions (rules)
 {return compfinds('A',seq('action','A'),seq(),rules)}

function findinits (rules)
 {return compfinds('P',seq('init','P'),seq(),rules)}

function findcontrol (facts,rules)
 {return compfindx('X',seq('control','X'),facts,rules)}

function findlegalp (move,facts,rules)
 {return compfindp(seq('legal',move),facts,rules)}

function findlegalx (facts,rules)
 {return compfindx('X',seq('legal','X'),facts,rules)}

function findlegals (facts,rules)
 {return compfinds('X',seq('legal','X'),facts,rules)}

function findreward (role,facts,rules)
 {var value = compfindx('R',seq('goal',role,'R'),facts,rules);
  if (value) {return value};
  return 0}

function findterminalp (facts,rules)
 {return compfindp('terminal',facts,rules)}

//------------------------------------------------------------------------------

function simulate (move,state,rules)
 {var deltas = compexpand(move,state,rules);
  var additions = [];
  var deletions = [];
  for (var i=0; i<deltas.length; i++)
      {if (symbolp(deltas[i])) {additions.push(deltas[i]); continue};
       if (deltas[i][0]==='not') {deletions.push(deltas[i][1]); continue};
       additions.push(deltas[i])};
  var newstate = [];
  for (i = 0; i<state.length; i++)
      {if (find(state[i],additions)) {continue};
       if (find(state[i],deletions)) {continue};
       newstate.push(state[i])};
  return newstate.concat(additions)}

//==============================================================================
// Communication
//==============================================================================

function send (msg,player)
 {var response = grind(seq('message',messageid.toString(),manager,player,msg));
  var transcript = document.getElementById('transcript');
  transcript.value = transcript.value + response + "\n";
  localStorage[player] = response;
  return true}

function handlestorage (ev)
 {//console.log(ev);
  if (ev.key!==manager) {return false};
  var transcript = document.getElementById('transcript');
  transcript.value = transcript.value + ev.newValue + "\n";

  envelope = read(ev.newValue);
  var msgid = envelope[1];
  var sender = envelope[2];
  var receiver = envelope[3];
  var message = envelope[4];
  if (parseInt(msgid)!==messageid) {return false};
  if (waiter==='ping') {return handleping(sender,message)};
  if (waiter==='start') {return handlestart(sender,message)};
  if (waiter==='play') {return handleplay(sender,message)};

  return true}

//==============================================================================
// End of manager
//==============================================================================
  </script>

//------------------------------------------------------------------------------

//------------------------------------------------------------------------------

function renderstate (state)
 {var table = document.createElement('table');
  table.setAttribute('cellspacing','0');
  //table.setAttribute('bgcolor','white');
  table.setAttribute('border','10');
  for (var i=0; i<5; i++) {
    makerow(table,i,state);
  }
  return table}

function makerow (table,rownum,state)
 {var row =table.insertRow(rownum);
  for (var i=0; i<10; i++) {
    makecell(row,rownum,i,state);
  }
  return row}

function makecell (row,rownum,colnum,state)
 {var cell = row.insertCell(colnum);
  cell.setAttribute('width','40');
  cell.setAttribute('height','40');
  cell.setAttribute('align','center');
  cell.setAttribute('valign','center');
  rownum_str = (rownum+1).toString();
  colnum_str = (colnum+1).toString();
  var mark = compfinds('Z',seq('cell',rownum_str,colnum_str,'Z'),state,seq());
  if (colnum < 5) {cell.setAttribute('bgcolor','#BBDDFF');}
  else {cell.setAttribute('bgcolor','#FFDDBB');}
  
  if (mark.includes('flag1')) {cell.setAttribute('bgcolor','#FF0000');};
  if (mark.includes('flag4')){cell.setAttribute('bgcolor','#0000FF');};
  if (mark.includes('knight1')) {cell.innerHTML = '<img src="../library/capturetheflag/images/Red_Knight.png" width="36" height="36"/>'};
  if (mark.includes('knight2')) {cell.innerHTML = '<img src="../library/capturetheflag/images/DarkRed_Knight.png" width="36" height="36"/>'};
  if (mark.includes('knight3')) {cell.innerHTML = '<img src="../library/capturetheflag/images/Blue_Knight.png" width="36" height="36"/>'};
  if (mark.includes('knight4')) {cell.innerHTML = '<img src="../library/capturetheflag/images/DarkBlue_Knight.png" width="36" height="36"/>'};
  if (mark==false) {cell.innerHTML = '&nbsp;'};
  return cell}

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% capturetheflag
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% metadata
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

role(robot1)
role(robot2)
role(robot3)
role(robot4)

base(step(0))
base(step(M)) :- add(1,count,N,M)
base(cell(M,N,P)) :- col(M) & row(N) & piece(P)
base(cell(M,N,P)) :- col(M) & row(N) & flag(P)
base(control(R)) :- role(R)

action(move(X1,Y1,X2,Y2)) :- col(X1) & row(Y1) & knightMove(X1,Y1,X2,Y2)
action(noop)

team(robot1, a)
team(robot2, a)
team(robot3, b)
team(robot4, b)

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% init
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

init(cell(1,10,knight1))
init(cell(5,10,knight2))
init(cell(1,1,knight3))
init(cell(5,1,knight4))
init(cell(3,10,flag1))
init(cell(3,1,flag4))
init(step(0))
init(control(robot1))

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% legal
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

legal(move(X1,Y1,X2,Y2)) :-
  control(R) & owns(K,R) & cell(X1,Y1,K) & knightMove(X1,Y1,X2,Y2)

legal(noop) :-
  owns(K,R) & cell(X1,Y1,K) & cell(X2,Y2,F) & distinct(X1,X2) & distinct(Y1,Y2) 

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% operations
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

move(X1,Y1,X2,Y2) :: owns(K,R) ==> ~cell(X1,Y1,K) & cell(X2,Y2,K)

noop :: kerchunk

nextmove(cell(X2,Y2,F)) :- flag(F) & owns(F,T) & team(R,T) & does(R,move(X1,Y1,X2,Y2)) & cell(X1,Y1,F) 

next(cell(X,Y,F)) :- flag(F) & row(Y2) & col(X2) & ~nextmove(cell(X2,Y2,F)) & cell(X,Y,F)

next(cell(X2,Y2,P)) :- nextmove(cell(X2,Y2,P)) & ~captured(P)
next(cell(X,Y,P)) :- init(cell(X,Y,P)) & captured(P)

kerchunk :: step(M) & add(1,count,M,N) ==> ~step(M) & step(N)

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% goal
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

goal(R,100) :- role(R) & team(R,a) & flagcap(a) & ~flagcap(b)
goal(R,0) :- role(R) & team(R,b) & flagcap(a) & ~flagcap(b)
goal(R,100) :- role(R) & team(R,b) & flagcap(b) & ~flagcap(a)
goal(R,0) :- role(R) & team(R,a) & flagcap(b) & ~flagcap(a)
goal(R,75) :- role(R) & flagcap(a) & flagcap(b)
goal(R,50) :- role(R) & expired

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% terminal
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

terminal :- expired
terminal :- flagcap(T)

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% Views
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

knightMove(X1,Y1,X2,Y2) :- add(1,x,X1,X2) & add(2,y,Y1,Y2)
knightMove(X1,Y1,X2,Y2) :- add(1,x,X1,X2) & add(2,y,Y2,Y1)
knightMove(X1,Y1,X2,Y2) :- add(1,x,X2,X1) & add(2,y,Y1,Y2)
knightMove(X1,Y1,X2,Y2) :- add(1,x,X2,X1) & add(2,y,Y2,Y1)
knightMove(X1,Y1,X2,Y2) :- add(2,x,X1,X2) & add(1,y,Y1,Y2)
knightMove(X1,Y1,X2,Y2) :- add(2,x,X1,X2) & add(1,y,Y2,Y1)
knightMove(X1,Y1,X2,Y2) :- add(2,x,X2,X1) & add(1,y,Y1,Y2)
knightMove(X1,Y1,X2,Y2) :- add(2,x,X2,X1) & add(1,y,Y2,Y1)

captured(F) :- flag(F) & team(R,T) & ~owns(F,T) & owns(K,R) & nextmove(cell(X,Y,F)) & nextmove(cell(X,Y,K))

captured(K) :- piece(K) & owns(K,R) & team(R,a) & team(R2,b) & owns(K2,R2) & nextmove(cell(X,Y,K)) & nextmove(cell(X,Y,K2)) & left(Y) & flag(F) & owns(F,b) & ~nextmove(cell(X,Y,F))

captured(K) :- piece(K) & owns(K,R) & team(R,b) & team(R2,a) & owns(K2,R2) & nextmove(cell(X,Y,K)) & nextmove(cell(X,Y,K2)) & right(Y) & flag(F) & owns(F,a) & ~nextmove(cell(X,Y,F))

captured(K) :- piece(K) & flag(F) & team(R,T) & owns(F,T) & owns(K,R) & piece(K2) & owns(K2,R2) & ~team(R2,T) & nextmove(cell(X,Y,K)) & nextmove(cell(X,Y,F)) & nextmove(cell(X,Y,K2))

flagcap(a) :- cell(X,10,F) & owns(F,a)
flagcap(b) :- cell(X,1,F) & owns(F,b)

expired :- step(30)

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% Facts
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

piece(knight1)
piece(knight2)
piece(knight3)
piece(knight4)
flag(flag1)
%flag(flag2)
%flag(flag3)
flag(flag4)
%flag(flag5)
%flag(flag6)

owns(knight1, robot1)
owns(knight2, robot2)
owns(knight3, robot3)
owns(knight4, robot4)
owns(flag1, b)
%owns(flag2, a)
%owns(flag3, a)
owns(flag4, a)
%owns(flag5, b)
%owns(flag6, b)

add(1,count,0,1)
add(1,count,1,2)
add(1,count,2,3)
add(1,count,3,4)
add(1,count,4,5)
add(1,count,5,6)
add(1,count,6,7)
add(1,count,7,8)

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% capturetheflag
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% metadata
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

role(robot1)
role(robot2)
role(robot3)
role(robot4)

base(step(0))
base(step(M)) :- add(1,count,N,M)
base(cell(M,N,P)) :- col(M) & row(N) & piece(P)
base(cell(M,N,P)) :- col(M) & row(N) & flag(P)
base(control(R)) :- role(R)

action(move(X1,Y1,X2,Y2)) :- col(X1) & row(Y1) & knightMove(X1,Y1,X2,Y2)
action(noop)

team(robot1, a)
team(robot2, a)
team(robot3, b)
team(robot4, b)

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% init
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

init(cell(1,10,knight1))
init(cell(5,10,knight2))
init(cell(1,1,knight3))
init(cell(5,1,knight4))
init(cell(3,10,flag1))
init(cell(3,1,flag4))
init(step(0))
init(control(robot1))

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% legal
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

legal(move(X1,Y1,X2,Y2)) :-
  control(R) & owns(K,R) & cell(X1,Y1,K) & knightMove(X1,Y1,X2,Y2)

legal(noop) :-
  owns(K,R) & cell(X1,Y1,K) & cell(X2,Y2,F) & distinct(X1,X2) & distinct(Y1,Y2) 

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% operations
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

move(X1,Y1,X2,Y2) :: owns(K,R) ==> ~cell(X1,Y1,K) & cell(X2,Y2,K)

noop :: kerchunk

nextmove(cell(X2,Y2,F)) :- flag(F) & owns(F,T) & team(R,T) & does(R,move(X1,Y1,X2,Y2)) & cell(X1,Y1,F) 

next(cell(X,Y,F)) :- flag(F) & row(Y2) & col(X2) & ~nextmove(cell(X2,Y2,F)) & cell(X,Y,F)

next(cell(X2,Y2,P)) :- nextmove(cell(X2,Y2,P)) & ~captured(P)
next(cell(X,Y,P)) :- init(cell(X,Y,P)) & captured(P)

kerchunk :: step(M) & add(1,count,M,N) ==> ~step(M) & step(N)

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% goal
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

goal(R,100) :- role(R) & team(R,a) & flagcap(a) & ~flagcap(b)
goal(R,0) :- role(R) & team(R,b) & flagcap(a) & ~flagcap(b)
goal(R,100) :- role(R) & team(R,b) & flagcap(b) & ~flagcap(a)
goal(R,0) :- role(R) & team(R,a) & flagcap(b) & ~flagcap(a)
goal(R,75) :- role(R) & flagcap(a) & flagcap(b)
goal(R,50) :- role(R) & expired

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% terminal
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

terminal :- expired
terminal :- flagcap(T)

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%%% Views
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

knightMove(X1,Y1,X2,Y2) :- add(1,x,X1,X2) & add(2,y,Y1,Y2)
knightMove(X1,Y1,X2,Y2) :- add(1,x,X1,X2) & add(2,y,Y2,Y1)
knightMove(X1,Y1,X2,Y2) :- add(1,x,X2,X1) & add(2,y,Y1,Y2)
knightMove(X1,Y1,X2,Y2) :- add(1,x,X2,X1) & add(2,y,Y2,Y1)
knightMove(X1,Y1,X2,Y2) :- add(2,x,X1,X2) & add(1,y,Y1,Y2)
knightMove(X1,Y1,X2,Y2) :- add(2,x,X1,X2) & add(1,y,Y2,Y1)
knightMove(X1,Y1,X2,Y2) :- add(2,x,X2,X1) & add(1,y,Y1,Y2)
knightMove(X1,Y1,X2,Y2) :- add(2,x,X2,X1) & add(1,y,Y2,Y1)

captured(F) :- flag(F) & team(R,T) & ~owns(F,T) & owns(K,R) & nextmove(cell(X,Y,F)) & nextmove(cell(X,Y,K))

captured(K) :- piece(K) & owns(K,R) & team(R,a) & team(R2,b) & owns(K2,R2) & nextmove(cell(X,Y,K)) & nextmove(cell(X,Y,K2)) & left(Y) & flag(F) & owns(F,b) & ~nextmove(cell(X,Y,F))

captured(K) :- piece(K) & owns(K,R) & team(R,b) & team(R2,a) & owns(K2,R2) & nextmove(cell(X,Y,K)) & nextmove(cell(X,Y,K2)) & right(Y) & flag(F) & owns(F,a) & ~nextmove(cell(X,Y,F))

captured(K) :- piece(K) & flag(F) & team(R,T) & owns(F,T) & owns(K,R) & piece(K2) & owns(K2,R2) & ~team(R2,T) & nextmove(cell(X,Y,K)) & nextmove(cell(X,Y,F)) & nextmove(cell(X,Y,K2))

flagcap(a) :- cell(X,10,F) & owns(F,a)
flagcap(b) :- cell(X,1,F) & owns(F,b)
