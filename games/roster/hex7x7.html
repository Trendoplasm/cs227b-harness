<head>
  <title>Manager</title>

  <script type='text/javascript'>
//==============================================================================
// Initialization
//==============================================================================

indexing = true;
dataindexing = false;
ruleindexing = true;

var manager = 'manager';
var players = 'anonymous';
var game = 'buttonsandlights';
var startclock = 10;
var playclock = 10;

var library = [];
var ruleset = [];
var roles = [];
var state = [];
var move = nil;
var errors = {};

var player = 'anonymous';
var actives = [];
var messageid = 0;
var waiter = 'load';
var timekeeper;

//==============================================================================

function doinitialize ()
 {window.addEventListener("storage",handlestorage,false);
  definerules(library,readdata(document.getElementById('library').value));
  ruleset = readdata(document.getElementById('ruleset').value);
  roles = findroles(library);
  state = findinits(library);
  errors = createerrors();
  createscoreboard();
  showstate(state);
  showscore(state);
  return true}

function reinitialize ()
 {state = findinits(library);
  errors = createerrors();
  createscoreboard();
  showstate(state);
  showscore(state);
  return true}

function createerrors ()
 {var errors = {};
  for (var i=0; i<roles.length; i++)
      {errors[roles[i]] = 0};
  return errors}

function createscoreboard ()
 {var scoreboard = document.getElementById('scoreboard');
  var n = scoreboard.rows.length;
  for (var i=0; i<n; i++) {scoreboard.deleteRow(0)};

  var row = scoreboard.insertRow(0);
  cell = row.insertCell(0);
  cell.innerHTML = 'Roles';
  cell.setAttribute('width','120');
  cell.setAttribute('align','center');
  cell.setAttribute('style','font-weight:bold');
  cell.setAttribute('bgcolor','#f4f8f8');
  for (var i=0; i<roles.length; i++)
      {cell = row.insertCell(i+1);
       cell.innerHTML = roles[i];
       cell.setAttribute('width','120');
       cell.setAttribute('align','center');
       cell.setAttribute('style','font-weight:bold');
       cell.setAttribute('bgcolor','#f4f8f8')};

  row = scoreboard.insertRow(1);
  cell = row.insertCell(0);
  cell.innerHTML = 'Players';
  cell.setAttribute('style','font-weight:bold');
  cell.setAttribute('bgcolor','#f4f8f8');
  cell.setAttribute('align','center');
  for (var i=0; i<roles.length; i++)
      {cell = row.insertCell(i+1);
       cell.setAttribute('align','center');
       cell.setAttribute('bgcolor','#f4f8f8');
       cell.setAttribute('onclick','changeplayer(this)');
       cell.style.cursor = 'pointer';
       cell.innerHTML = players[i] ? players[i] : 'anonymous'};

  row = scoreboard.insertRow(2);
  cell = row.insertCell(0);
  cell.innerHTML = 'Score';
  cell.setAttribute('style','font-weight:bold');
  cell.setAttribute('bgcolor','#f4f8f8');
  cell.setAttribute('align','center');
  for (var i=0; i<roles.length; i++)
      {cell = row.insertCell(i+1);
       cell.setAttribute('align','center');
       cell.innerHTML = '&nbsp;'};

  row = scoreboard.insertRow(3);
  cell = row.insertCell(0);
  cell.innerHTML = 'Errors';
  cell.setAttribute('style','font-weight:bold');
  cell.setAttribute('bgcolor','#f4f8f8');
  cell.setAttribute('align','center');
  for (var i=0; i<roles.length; i++)
      {cell = row.insertCell(i+1);
       cell.setAttribute('align','center');
       cell.innerHTML = '0'};

  return true}

function changeplayer (node)
 {var scoreboard = document.getElementById('scoreboard');
  var row = scoreboard.rows[1];
  for (var i=1; i<row.cells.length; i++)
      {if (row.cells[i]===node)
          {var newplayer = prompt("Player name:");
           players[i-1] = newplayer;
           row.cells[i].innerHTML = newplayer;
           return true}};
  return false}

function getrole (player)
 {for (var i=0; i<players.length; i++)
      {if (player===players[i]) {return roles[i]}};
  return 'robot'}

function getplayer (role)
 {for (var i=0; i<roles.length; i++)
      {if (role===roles[i]) {return players[i]}};
  return 'anonymous'}

//==============================================================================
// Display
//==============================================================================

function showstate (state)
 {var stateholder = document.getElementById('stateholder');
  var n = stateholder.childNodes.length;
  for (var i=0; i<n; i++) {stateholder.removeChild(stateholder.childNodes[0])};
  stateholder.appendChild(renderstate(state));
  return true}

function showscore (state)
 {var scoreboard = document.getElementById('scoreboard');
  var row = scoreboard.rows[2];
  for (var i=0; i<roles.length; i++)
      {row.cells[i+1].innerHTML = findreward(roles[i],state,library)};
  return true}

function showerrors ()
 {var scoreboard = document.getElementById('scoreboard');
  var row = scoreboard.rows[3];
  for (var i=0; i<roles.length; i++)
      {row.cells[i+1].innerHTML = errors[roles[i]]};
  return true}

//==============================================================================
// Controls
//==============================================================================

function dopinger ()
 {document.getElementById('pinger').disabled = false;
  document.getElementById('starter').disabled = false;
  document.getElementById('aborter').disabled = true;
  doping();
  return true}

function dorunner ()
 {document.getElementById('pinger').disabled = true;
  document.getElementById('starter').disabled = true;
  document.getElementById('aborter').disabled = false;
  dostart();
  return true}

function doaborter ()
 {document.getElementById('pinger').disabled = false;
  document.getElementById('starter').disabled = false;
  document.getElementById('aborter').disabled = true;
  doabort();
  return true}

//==============================================================================
// Operations
//==============================================================================

function doping ()
 {waiter = 'ping';
  messageid++;
  actives = [];
  for (var i=0; i<roles.length; i++)
      {send(seq('ping'),players[i])};
  timekeeper = beginclock(5);
  return true}

function handleping (sender,message)
 {if (message!=='ready') {return false};
  actives = adjoin(getrole(sender),actives);
  if (actives.length===roles.length) {clearclock(); return endping()};
  return true}

function endping ()
 {waiter = 'load';
  alert(actives.length + "/" + roles.length + " ready.");
  return true}

//==============================================================================

function dostart ()
 {waiter = 'start';
  messageid++;
  reinitialize();
  actives = [];
  move = nil;
  var rules = seq('ruleset').concat(ruleset);
  var sc = stringize(startclock);
  var pc = stringize(playclock);
  for (var i=0; i<roles.length; i++)
      {var message = grind(seq('start',roles[i],rules,sc,pc));
       send(message,players[i])};
  timekeeper = beginclock(startclock);
  return true}

function handlestart (sender,message)
 {if (message!=='ready') {return false};
  actives = adjoin(getrole(sender),actives);
  if (actives.length===roles.length) {clearclock(); return endstart()};
  return true}

function endstart ()
 {waiter = 'load';
  setTimeout(doplay,1000);
  return true}

//==============================================================================

function doplay ()
 {waiter = 'play';
  messageid++;
  for (var i=0; i<roles.length; i++)
      {var message = grind(seq('play',move));
       send(message,players[i])};
  timekeeper = beginclock(playclock);
  return true}

function handleplay (sender,message)
 {var role = getrole(sender);
  if (role!==findcontrol(state,library)) {return false};
  move = message;
  if (!findlegalp(move,state,library)) {playerror(role)};
  clearclock();
  endplay();
  return true};

function playerror (role)
 {var actions=findlegals(state,library);
  var ind = Math.floor(Math.random()*actions.length);
  var newmove = actions[ind];
  errors[role] = errors[role]+1;
  console.log("Error: " + move + ".  Playing " + grind(newmove));
  move = newmove;
  return true}

function playdefault ()
 {var role = findcontrol(state,library);
  var actions=findlegals(state,library);
  var ind = Math.floor(Math.random()*actions.length);
  move = actions[ind];
  errors[role] = errors[role]+1;
  console.log("Timeout.  Playing " + grind(move));
  endplay();
  return true}

function endplay ()
 {waiter = 'load';
  state = simulate(move,state,library);
  showstate(state);
  showscore(state);
  showerrors();
  if (findterminalp(state,library)) {dostop(); return true};
  setTimeout(doplay,1000);
  return true}

//==============================================================================

function dostop ()
 {waiter = 'load';
  messageid++;
  var message = grind(seq('stop',move));
  for (var i=0; i<roles.length; i++)
      {send(message,players[i])};
  document.getElementById('pinger').disabled = false;
  document.getElementById('starter').disabled = false;
  document.getElementById('aborter').disabled = true;
  return false}

//==============================================================================

function doabort ()
 {waiter = 'load';
  messageid++;
  var message = grind(seq('abort'));
  for (var i=0; i<roles.length; i++)
      {send(message,players[i])};
  return true}

//==============================================================================
// Timer
//==============================================================================

function beginclock (n)
 {if (n===Infinity) {return false};
  document.getElementById('timer').value = n;
  return setInterval(updateclock,1000)}

function updateclock ()
 {var timer = document.getElementById('timer');
  var time = timer.value - 1;
  timer.value = time;
  if (time<=0) {endclock()};
  return true}

function endclock ()
 {clearclock();
  if (waiter==='ping') {return endping()};
  if (waiter==='start') {return endstart()};
  if (waiter==='play') {return playdefault()};
  return true}

function clearclock ()
 {document.getElementById('timer').value = '';
  clearInterval(timekeeper);
  return true}

//==============================================================================
// Basics
//==============================================================================

function findroles (rules)
 {return compfinds('R',seq('role','R'),seq(),rules)}

function findbases (rules)
 {return compfinds('P',seq('base','P'),seq(),rules)}

function findactions (rules)
 {return compfinds('A',seq('action','A'),seq(),rules)}

function findinits (rules)
 {return compfinds('P',seq('init','P'),seq(),rules)}

function findcontrol (facts,rules)
 {return compfindx('X',seq('control','X'),facts,rules)}

function findlegalp (move,facts,rules)
 {return compfindp(seq('legal',move),facts,rules)}

function findlegalx (facts,rules)
 {return compfindx('X',seq('legal','X'),facts,rules)}

function findlegals (facts,rules)
 {return compfinds('X',seq('legal','X'),facts,rules)}

function findreward (role,facts,rules)
 {var value = compfindx('R',seq('goal',role,'R'),facts,rules);
  if (value) {return value};
  return 0}

function findterminalp (facts,rules)
 {return compfindp('terminal',facts,rules)}

//------------------------------------------------------------------------------

function simulate (move,state,rules)
 {var deltas = compexpand(move,state,rules);
  var additions = [];
  var deletions = [];
  for (var i=0; i<deltas.length; i++)
      {if (symbolp(deltas[i])) {additions.push(deltas[i]); continue};
       if (deltas[i][0]==='not') {deletions.push(deltas[i][1]); continue};
       additions.push(deltas[i])};
  var newstate = [];
  for (i = 0; i<state.length; i++)
      {if (find(state[i],additions)) {continue};
       if (find(state[i],deletions)) {continue};
       newstate.push(state[i])};
  return newstate.concat(additions)}

//==============================================================================
// Communication
//==============================================================================

function send (msg,player)
 {var response = grind(seq('message',messageid.toString(),manager,player,msg));
  var transcript = document.getElementById('transcript');
  transcript.value = transcript.value + response + "\n";
  localStorage[player] = response;
  return true}

function handlestorage (ev)
 {//console.log(ev);
  if (ev.key!==manager) {return false};
  var transcript = document.getElementById('transcript');
  transcript.value = transcript.value + ev.newValue + "\n";

  envelope = read(ev.newValue);
  var msgid = envelope[1];
  var sender = envelope[2];
  var receiver = envelope[3];
  var message = envelope[4];
  if (parseInt(msgid)!==messageid) {return false};
  if (waiter==='ping') {return handleping(sender,message)};
  if (waiter==='start') {return handlestart(sender,message)};
  if (waiter==='play') {return handleplay(sender,message)};

  return true}

//==============================================================================
// End of manager
//==============================================================================
  </script>

 </script>

  <script type='text/javascript'>
//==============================================================================
// Hex
//==============================================================================

function renderstate (state)
 {var step = compfindx('N',seq('step','N'),state,library);
  var role = compfindx('R',seq('control','R'),state,library);
  var table = document.createElement('table');
  table.setAttribute('border','0');
  var row = table.insertRow(0);
  var cell = row.insertCell(0);
  cell.setAttribute('align','center');
  cell.setAttribute('style','font-size:20px');
  cell.innerHTML = 'Step:  ' + step;
  row = table.insertRow(1);
  var cell = row.insertCell(0);
  var board = renderboard(state);
  cell.appendChild(board);
  row = table.insertRow(2);
  var cell = row.insertCell(0);
  cell.setAttribute('align','center');
  cell.setAttribute('style','font-size:20px');
  if (compfindp('terminal',state,library))
     {cell.innerHTML = 'Game over'}
     else {cell.innerHTML = 'Control:  ' + role};
  return table}

function renderboard (state)
 {var canvas = document.createElement('canvas');
  canvas.setAttribute('width','400px');
  canvas.setAttribute('height','340px');

  drawhex(180, 40,canvas);

  drawreddish(150, 60,canvas);
  drawgrey(210, 60,canvas);

  drawreddish(120, 80,canvas);
  drawhex(180, 80,canvas);
  drawgrey(240, 80,canvas);

  drawreddish( 90,100,canvas);
  drawhex(150,100,canvas);
  drawhex(210,100,canvas);
  drawgrey(270,100,canvas);

  drawreddish( 60,120,canvas);
  drawhex(120,120,canvas);
  drawhex(180,120,canvas);
  drawhex(240,120,canvas);
  drawgrey(300,120,canvas);

  drawreddish( 30,140,canvas);
  drawhex( 90,140,canvas);
  drawhex(150,140,canvas);
  drawhex(210,140,canvas);
  drawhex(270,140,canvas);
  drawgrey(330,140,canvas);

  drawhex(  0,160,canvas);
  drawhex(60,160,canvas);
  drawhex(120,160,canvas);
  drawhex(180,160,canvas);
  drawhex(240,160,canvas);
  drawhex(300,160,canvas);
  drawhex(360,160,canvas);

  drawgrey( 30,180,canvas);
  drawhex( 90,180,canvas);
  drawhex(150,180,canvas);
  drawhex(210,180,canvas);
  drawhex(270,180,canvas);
  drawreddish(330,180,canvas);

  drawgrey( 60,200,canvas);
  drawhex(120,200,canvas);
  drawhex(180,200,canvas);
  drawhex(240,200,canvas);
  drawreddish(300,200,canvas);

  drawgrey( 90,220,canvas);
  drawhex(150,220,canvas);
  drawhex(210,220,canvas);
  drawreddish(270,220,canvas);

  drawgrey(120,240,canvas);
  drawhex(180,240,canvas);
  drawreddish(240,240,canvas);

  drawgrey(150,260,canvas);
  drawreddish(210,260,canvas);

  drawhex(180,280,canvas);

  for (var i=0; i<state.length; i++)
      {if (state[i][0]=='cell')
          {var x = xpos(state[i][1],state[i][2]);
           var y = ypos(state[i][1],state[i][2]);
           if (state[i][3]=='red') {drawred(x,y,canvas)};
           if (state[i][3]=='black') {drawblack(x,y,canvas)}}};

  return canvas}

function xpos (m,n)
 {return xm(m)+xn(n)}

function ypos (m,n)
 {return 160+ym(m)-yn(n)}

function xm (m)
 {if (m=='a') {return 0};
  if (m=='b') {return 30};
  if (m=='c') {return 60};
  if (m=='d') {return 90};
  if (m=='e') {return 120};
  if (m=='f') {return 150};
  if (m=='g') {return 180};
  if (m=='h') {return 210};
  if (m=='i') {return 240};
  if (m=='j') {return 270};
  if (m=='k') {return 300};
  return 330}

function ym (m)
 {if (m=='a') {return 0};
  if (m=='b') {return 20};
  if (m=='c') {return 40};
  if (m=='d') {return 60};
  if (m=='e') {return 80};
  if (m=='f') {return 100};
  if (m=='g') {return 120};
  if (m=='h') {return 140};
  if (m=='i') {return 160};
  if (m=='j') {return 180};
  if (m=='k') {return 200};
  return 330}

function yn (n)
 {if (n=='1') {return 0};
  if (n=='2') {return 20};
  if (n=='3') {return 40};
  if (n=='4') {return 60};
  if (n=='5') {return 80};
  if (n=='6') {return 100};
  if (n=='7') {return 120};
  if (n=='8') {return 140};
  if (n=='9') {return 160};
  if (n=='10') {return 180};
  if (n=='11') {return 200};
  return 330}

function xn (n)
 {if (n=='1') {return 0};
  if (n=='2') {return 30};
  if (n=='3') {return 60};
  if (n=='4') {return 90};
  if (n=='5') {return 120};
  if (n=='6') {return 150};
  if (n=='7') {return 180};
  if (n=='8') {return 210};
  if (n=='9') {return 240};
  if (n=='10') {return 270};
  if (n=='11') {return 300};
  return 330}

//------------------------------------------------------------------------------
// Drawing subroutines
//------------------------------------------------------------------------------

function drawreddish (x,y,w)
 {var ctx = w.getContext('2d');
  ctx.beginPath();
  ctx.lineWidth=1;
  ctx.moveTo(x+10,y+ 0);
  ctx.lineTo(x+30,y+ 0);
  ctx.lineTo(x+40,y+20);
  ctx.lineTo(x+30,y+40);
  ctx.lineTo(x+10,y+40);
  ctx.lineTo( x+0,y+20);
  ctx.closePath();
  ctx.fillStyle = "#fff0f0";
  ctx.fill();
  ctx.stroke()}

function drawgrey (x,y,w)
 {var ctx = w.getContext('2d');
  ctx.beginPath();
  ctx.lineWidth=1;
  ctx.moveTo(x+10,y+ 0);
  ctx.lineTo(x+30,y+ 0);
  ctx.lineTo(x+40,y+20);
  ctx.lineTo(x+30,y+40);
  ctx.lineTo(x+10,y+40);
  ctx.lineTo( x+0,y+20);
  ctx.closePath();
  ctx.fillStyle = "#dddddd";
  ctx.fill();
  ctx.stroke()}

function drawhex (x,y,canvas)
 {drawline(x+ 0,y+20,x+10,y+ 0,canvas);
  drawline(x+10,y+ 0,x+30,y+ 0,canvas);
  drawline(x+30,y+ 0,x+40,y+20,canvas);
  drawline(x+40,y+20,x+30,y+40,canvas);
  drawline(x+30,y+40,x+10,y+40,canvas);
  drawline(x+10,y+40, x+0,y+20,canvas)}

function drawred (x,y,w)
 {var ctx = w.getContext('2d');
  ctx.beginPath();
  ctx.lineWidth=2;
  ctx.arc(x+20,y+20,12,0,2*Math.PI,false);
  ctx.stroke();
  ctx.fillStyle = "#ff8888";
  ctx.fill();}

function drawblack (x,y,w)
 {var ctx = w.getContext('2d');
  ctx.beginPath();
  ctx.lineWidth=2;
  ctx.arc(x+20,y+20,12,0,2*Math.PI,false);
  ctx.stroke();
  ctx.fillStyle = "#888888";
  ctx.fill();}

function drawblank (x,y,w)
 {var ctx = w.getContext('2d');
  ctx.beginPath();
  ctx.lineWidth=2;
  ctx.arc(x+20,y+20,12,0,2*Math.PI,false);
  ctx.stroke();
  ctx.fillStyle = "#ffffff";
  ctx.fill();}

function drawline(u,v,x,y,w)
 {var ctx = w.getContext('2d');
  ctx.beginPath();
  ctx.lineWidth=1;
  ctx.moveTo(u,v);
  ctx.lineTo(x,y);
  ctx.stroke()}

function drawnode (node,x,y,canvas)
 {var mark = compfindx('X',seq('cell',node,'X'),state,library);
  if (mark=='red') {drawred(x,y,canvas); return true};
  if (mark=='black') {drawblack(x,y,canvas); return true};
  drawblank(x,y,canvas);
  return true}

function drawtext (text,x,y,w)
 {var ctx = w.getContext('2d');
  ctx.fillStyle = "#000000";
  ctx.font="italic 14px Times"
  ctx.fillText(text,x+12,y+18);
  return true}

function drawscore (text,x,y,w)
 {var ctx = w.getContext('2d');
  ctx.fillStyle = "#000000";
  ctx.font="28px Times"
  ctx.fillText(text,x+12,y+18);
  return true}

//==============================================================================
//==============================================================================
//==============================================================================
  </script>
