var manager = 'manager';
var player = 'cyclone';

function start (r,rs,sc,pc)
 {role = r;
  rules = rs.slice(1);
  startclock = numberize(sc);
  playclock = numberize(pc);

  rules = definemorerules([],rules); library = rules;
  rules = materializestaticrelations(rules);
  rules = groundrules(rules);
  rules = simplifyrules(rules);
  rules = symbolizerules(rules);

  library = definemorerules([],rules);
  roles = findroles(library);
  state = findinits(library);
  return 'ready'}

function play (move)
 {move = symbolizeatom(move);
  if (move!==nil) {state = simulate(move,state,library)};
  if (findcontrol(state,library)!==role) {return false};
  move = playmcs(move);
  if (move) {return unsymbolizeatom(move)};
  return false}

//==============================================================================
// End of Customization
//==============================================================================
  </script>
