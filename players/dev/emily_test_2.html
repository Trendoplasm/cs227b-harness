function start (player,rules,sc,pc)
 {game = definerules([], rules.slice(1));

  state = findinits(game);

function play (move){
  if (move!==nil){
  state = simulate(move, state, game)};
  if (findcontrol(state, game) !==role) {return false};
  return bestmove(state);
}


function bestmove(state){
  var actions = findlegals(state, game);
  var action = actions[0];
  var score = 0;
  for (var i=0; i<actions.length; i++) {
      var newstate = simulate(actions[i], state, game);
      var newscore = minimax(newstate);
      if (newscore > score) {
          score = newscore;
          action = actions[i];
      }
  }
  return action;
}


function minimax (state) {
  if (findterminalp(state, game)){
      return findreward(role, state, game)*1;
  }
  var active = findcontrol(state, game)
  if (active === role){
     return maximize(state);
  }
  return minimize(state);
}


function maximize (state) {
  var actions = findlegals(state, game);
  if (actions.length === 0) {
      return 0;
  }
  var score = 0;
  for (var i=0; i<actions.length; i++){
      var newstate = simulate(actions[i],state, game);
      var newscore = minimax(newstate);
      if (newscore > score) {
          score = newscore;
      }
  }
  return score;
}


function minimize (state) {
  var actions = findlegals(state, game);
  if (actions.length === 0) {
     return 0;
  }
  var score = 100;
  for (var i=0; i<actions.length; i++){
      var newstate = simulate(actions[i],state, game);
      var newscore = minimax(newstate);
      if (newscore < score){
         score = newscore;
      }
  }
  return score;
}
