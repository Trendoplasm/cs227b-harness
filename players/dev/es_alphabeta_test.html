var manager = 'manager';

var role = 'robot';

var playclock = 10;

var library = [];
var roles = [];

//==============================================================================

// Alpha-Beta Player
// Extends minimax with dynamically computed bounds passed
// as parameters — exactly as described in lecture slide 48:
// "Same as Bounded Minimax except bounds are computed
// dynamically and passed along as parameters."
//
// Alpha = the best score WE can guarantee from earlier in search.
// Beta  = the best score the OPPONENT can guarantee (upper bound on
//         what they'll let us get).
//
// If a max node finds a score >= beta, opponent won't allow this
// branch — PRUNE. If a min node finds score <= alpha, we already
// have better — PRUNE. This can reduce the search space to the
// square root of the unpruned tree (lecture slide 51), letting us
// search far deeper within the play clock than plain minimax.

function ping() { return 'ready'; }

function start(r, rs, sc, pc) {
    role = r;
    library = definemorerules([], rs.slice(1));
    roles = findroles(library);
    state = findinits(library);
    startclock = numberize(sc);
    playclock = numberize(pc);
    return 'ready';
}

function play(move) {
    if (move !== nil) { state = simulate(move, state, library); }
    if (findcontrol(state, library) !== role) { return false; }
    return bestmove(state);
}

function stop(move) { return false; }
function abort() { return false; }

function bestmove(state) {
    var actions = findlegals(state, library);
    var action = actions[0];
    var score = 0;
    var alpha = 0;    // best we've found so far
    var beta = 100;   // best opponent will allow
    for (var i = 0; i < actions.length; i++) {
        var newstate = simulate(actions[i], state, library);
        var newscore = alphabeta(newstate, alpha, beta);
        if (newscore > score) { score = newscore; action = actions[i]; }
        if (score >= beta) { return action; }  // can't do better
        if (score > alpha) { alpha = score; }  // tighten lower bound
    }
    return action;
}

// Dispatches to ab_maximize or ab_minimize based on whose turn it is
function alphabeta(state, alpha, beta) {
    if (findterminalp(state, library)) {
        return findreward(role, state, library) * 1;
    }
    var active = findcontrol(state, library);
    if (active === role) { return ab_maximize(state, alpha, beta); }
    return ab_minimize(state, alpha, beta);
}

// Our turn: maximize score, prune when score >= beta
function ab_maximize(state, alpha, beta) {
    var actions = findlegals(state, library);
    if (actions.length === 0) { return 0; }
    var score = alpha;  // no point finding worse than what we have
    for (var i = 0; i < actions.length; i++) {
        var newstate = simulate(actions[i], state, library);
        var newscore = alphabeta(newstate, score, beta);
        if (newscore > score) { score = newscore; }
        if (score >= beta) { return score; }  // beta cutoff — opponent won't allow this
    }
    return score;
}

// Opponent's turn: minimize our score, prune when score <= alpha
function ab_minimize(state, alpha, beta) {
    var actions = findlegals(state, library);
    if (actions.length === 0) { return 0; }
    var score = beta;   // no point finding better than what they'll allow
    for (var i = 0; i < actions.length; i++) {
        var newstate = simulate(actions[i], state, library);
        var newscore = alphabeta(newstate, alpha, score);
        if (newscore < score) { score = newscore; }
        if (score <= alpha) { return score; }  // alpha cutoff — we have better elsewhere
    }
    return score;
}
