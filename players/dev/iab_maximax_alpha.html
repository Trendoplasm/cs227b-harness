
 <!--
  maximaxab.js
  
  Assignment 3 - Complete Search
  
  This player implements maximax search with alpha-beta pruning for general
  game playing. Rather than alternating between a maximizer and minimizer, every      player maximizes their own score. The score at each node is a vector, one entry
  per role, rather than a single value.

  Alpha-beta pruning (from Exercise 3.3) is the central optimization of the week.
  In standard two-player minimax, alpha and beta bound what the maximizer and
  minimizer can respectively guarantee. Here, the analog is a "floor" vector
  passed down the tree: floor[p] records the best score player p has already
  secured among previously explored siblings at their nearest ancestor node.
  If the current node cannot beat that floor for the relevant player, that
  player would never choose this branch — so we prune and return false.
-->

  <script type='text/javascript'>


var manager = 'manager';
var player = 'iab_maximax_alpha';

var role = 'robot';
var rules = [];
var startclock = 10;
var playclock = 10;

var library = [];
var roles = [];
var state = [];

//==============================================================================

function ping ()
 {return 'ready'}

function start (r,rs,sc,pc)
 {role = r;
  rules = rs.slice(1);
  startclock = numberize(sc);
  playclock = numberize(pc);
  library = definemorerules([],rs.slice(1));
  roles = findroles(library);
  state = findinits(library);
  return 'ready'}

function play (move)
 {if (move!==nil) {state = simulate(move,state,library)};
  if (findcontrol(state,library)!==role) {return false};
  return playmaximaxab(role)}

function stop (move)
 {return false}

function abort ()
 {return false}

//==============================================================================
// maximax with alpha-beta pruning
//==============================================================================

var nodes = 0;
var terminals = 0;
var elapsed = 0;

function playmaximaxab (role)
 {// Get all legal actions, shuffled to avoid bias in move ordering
  var actions = shuffle(findlegals(state,library));
  if (actions.length===0) {return false};
  if (actions.length===1) {return actions[0]};
  var action = actions[0];
  var score = 0;
  nodes = 0;
  // floor: tracks the best score our role has secured so far across siblings.
  var floor = {};
  for (var i=0; i<roles.length; i++) {floor[roles[i]] = -1};
  for (var i=0; i<actions.length; i++)
      {var newstate = simulate(actions[i],state,library);
       // Search the subtree; returns false if the subtree was pruned
       var newvector = maximaxab(newstate, floor);
       if (newvector===false) {continue};
       // Found a winning move — return immediately, no need to search further
       if (newvector[role]===100) {return actions[i]};
       // Track the best action found so far by our role's score
       if (newvector[role]>score) {score = newvector[role]; action = actions[i]};
       // Raise the floor to know what to beat
       if (newvector[role]>floor[role]) {floor[role] = newvector[role]}};
  return action}

// Test harness for maximaxab. Runs a full search from the given state and
// returns the score for the given role
function testmaximaxab (role,state)
 {
  nodes = 0;
  terminals = 0;
  // Record start time to measure search duration
  var beg = performance.now();
  var floor = {};
  for (var i=0; i<roles.length; i++) {floor[roles[i]] = -1};
  // Run the full maximax search with alpha-beta pruning from this state
  var vector = maximaxab(state, floor);
  // Record elapsed time in milliseconds, stored globally for inspection
  var end = performance.now();
  elapsed = Math.round(end-beg);
  return vector[role]}

function maximaxab (state, floor)
 {nodes = nodes + 1;
  if (findterminalp(state,library))
     {terminals = terminals + 1;
      var vector = {};
      for (var i=0; i<roles.length; i++)
          {vector[roles[i]] = findreward(roles[i],state,library)*1};
      return vector};
  var active = findcontrol(state,library);
  var actions = findlegals(state,library);
  // best: the best vector found so far for this node
  var best = {};
  for (var i=0; i<roles.length; i++) {best[roles[i]] = -1};
  for (var i=0; i<actions.length; i++)
      {// Pass a copy of the floor down, updated with what we've found so far
       var newfloor = copyobj(floor);
       // The active player will propagate at least what they've found so far
       // Prune: if best[active] is already worse than floor[active] for
       // any ancestor, that ancestor won't choose us — but we check lazily below
       var newstate = simulate(actions[i],state,library);
       newfloor[active] = best[active];

       var newvector = maximaxab(newstate, newfloor);
       if (newvector===false) {continue};
       if (newvector[active] < best[active]) {continue};
       if (newvector[active] > best[active])
          {best = newvector;
           // Prune: if the active player has found something better than
           // what the parent was limiting, prune branch
           if (best[active] <= floor[active]) {return false}};
       for (var j=0; j<roles.length; j++)
           {if (roles[j]!==active)
               {best[roles[j]] = Math.min(best[roles[j]],newvector[roles[j]])}}};
  return best}

function copyobj (obj)
 {var copy = {};
  for (var key in obj) {copy[key] = obj[key]};
  return copy}

function shuffle (array)
 {for (var i = array.length-1; i>0; i--)
      {var j = Math.floor(Math.random() * (i + 1));
       var temp = array[i];
       array[i] = array[j];
       array[j] = temp};
  return array}

//==============================================================================
// End of player code
//==============================================================================
  </script>
