<!--
  Alpha-beta player. Builds on minimax by tracking two bounds so alpha
  (the best score we are guaranteed) and beta (the best score the
  opponent is guaranteed). Any branch where alpha >= beta gets pruned
  since it can't change the final decision so this means we explore
  far fewer nodes than plain minimax and can search deeper in the same
  amount of time. For single-player games, only the maximize side is used.
  For multiplayer games like Tic Tac Toe, it alternates between maximizing for
  us and minimizing for the opponent, assuming they play optimally.
-->
<script type='text/javascript'>
//==============================================================================
var manager = 'manager';
var player = 'omnom';
var role = 'robot';
var rules = [];
var startclock = 10;
var playclock = 10;
var library = [];
var roles = [];
var state = [];
var timer_expired = false;
//==============================================================================
function ping ()
 {return 'ready'}

function start (r,rs,sc,pc)
 {role = r;
  rules = rs.slice(1);
  startclock = numberize(sc);
  playclock = numberize(pc);
  library = definemorerules([],rules);
  roles = findroles(library);
  state = findinits(library);
  return 'ready'}

function play (move)
 {if (move!==nil) {state = simulate(move,state,library)};
  if (findcontrol(state,library)!==role) {return false};
  return playalphabeta(role)}

function stop (move)
 {return false}

function abort ()
 {return false}

//==============================================================================
// Alpha-Beta Search
//==============================================================================


function playalphabeta (role)
 {timer_expired = false;
  setTimeout(() => {console.log("timeout!"); timer_expired = true;}, 5)
  var actions = shuffle(findlegals(state,library));
  if (actions.length===0) {return false};
  if (actions.length===1) {return actions[0]};
  var action = actions[0];
  var score = 0;
  for (var i=0; i<actions.length; i++)
      {var newstate = simulate(actions[i],state,library);
       var newscore = alphabeta(role,newstate,0,100);
       if (newscore===100) {return actions[i]};
       if (newscore>score) {action = actions[i]; score = newscore}};
  return action}

function alphabeta (role,state,alpha,beta)
 {
  if (findterminalp(state,library) || timer_expired)
     {return findreward(role,state,library)*1};
  var active = findcontrol(state,library);
  if (active===role) {return alphabetamaximize(active,role,state,alpha,beta)};
  return alphabetaminimize(active,role,state,alpha,beta)}

function alphabetamaximize (active,role,state,alpha,beta)
 {var actions = findlegals(state,library);
  if (actions.length===0) {return alpha};
  for (var i=0; i<actions.length; i++)
      {var newstate = simulate(actions[i],state,library);
       var newscore = alphabeta(role,newstate,alpha,beta);
       if (newscore===100) {return 100};
       if (newscore>alpha) {alpha = newscore};
       if (alpha>=beta) {return alpha}};
  return alpha}

function alphabetaminimize (active,role,state,alpha,beta)
 {var actions = findlegals(state,library);
  if (actions.length===0) {return beta};
  for (var i=0; i<actions.length; i++)
      {var newstate = simulate(actions[i],state,library);
       var newscore = alphabeta(role,newstate,alpha,beta);
       if (newscore===0) {return 0};
       if (newscore<beta) {beta = newscore};
       if (alpha>=beta) {return beta}};
  return beta}

function shuffle (array)
 {for (var i = array.length-1; i>0; i--)
      {var j = Math.floor(Math.random() * (i + 1));
       var temp = array[i];
       array[i] = array[j];
       array[j] = temp};
  return array}

//==============================================================================
// End of player code
//==============================================================================
  </script>
