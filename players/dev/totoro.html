var manager = 'manager';
var player = 'totoro';

var role = 'robot';
var rules = [];
var startclock = 10;
var playclock = 10;

var library = [];
var roles = [];
var state = [];

//==============================================================================

function ping ()
 {return 'ready'}

function start (r,rs,sc,pc)
 {role = r;
  rules = rs.slice(1);
  startclock = numberize(sc);
  playclock = numberize(pc);
  library = definemorerules([],rules);
  roles = findroles(library);
  state = findinits(library);
  return 'ready'}

function play (move)
 {if (move!==nil) {state = simulate(move,state,library)};
  if (findcontrol(state,library)!==role) {return false};
  var moves = findlegals(state,library);
  if (moves.length===0) {return false};
  var bestmove = moves[0];
  var bestscore = -1;
  var alpha = -1;
  var beta = 101;
  for (var i = 0; i < moves.length; i++) {
    var newstate = simulate(moves[i], state, library);
    var newscore = alphabeta(newstate, alpha, beta);
    if (newscore > bestscore) { bestscore = newscore; bestmove = moves[i] }
    if (bestscore > alpha) { alpha = bestscore }
    if (alpha >= beta) { break }
  }
  return bestmove}


function maximax (state) {
  if (findterminalp(state, library)){
    var vector = {};
    for (var i = 0; i < roles.length; i++) {
      vector[roles[i]] = findreward(roles[i], state, library)*1};
    return vector;
  }
  var active = findcontrol(state, library);
  var actions = findlegals(state, library);
  var vector = {};
  for (var i = 0; i < roles.length; i++) { vector[roles[i]] = 100 }
  vector[active] = -1;
  for (var i = 0; i < actions.length; i++) {
    var newstate = simulate(actions[i], state, library);
    var newvector = maximax(newstate);
    if (newvector[active] > vector[active]) { vector = newvector }
    for (var j = 0; j < roles.length; j++) {
      if (roles[j] !== active) {
        vector[roles[j]] = Math.min(vector[roles[j]], newvector[roles[j]])
      }
    }
  };
  return vector
}

function alphabeta (state, alpha, beta) {
  if (findterminalp(state, library)) { return findreward(role, state, library)*1 }
  var active = findcontrol(state, library);
  var actions = findlegals(state, library);
  if (actions.length === 0) { return 0 }
  if (active === role) {
    var value = -1;
    for (var i = 0; i < actions.length; i++) {
      var newstate = simulate(actions[i], state, library);
      var newscore = alphabeta(newstate, alpha, beta);
      if (newscore > value) { value = newscore }
      if (value > alpha) { alpha = value } // update alpha
      if (alpha >= beta) { break }
    }
    return value
  }
  var value = 101;
  for (var i = 0; i < actions.length; i++) {
    var newstate = simulate(actions[i], state, library);
    var newscore = alphabeta(newstate, alpha, beta);
    if (newscore < value) { value = newscore }
    if (value < beta) { beta = value }
    if (alpha >= beta) { break }
  }
  return value
}

function maximize(state) {
  var actions = findlegals(state, library);
  if (actions.length === 0) { return 0 };
  var score = 0;
  for (var i = 0; i < actions.length; i++) {
    var newstate = simulate(actions[i], state, library);
    var newscore = minimax(newstate);
    if (newscore > score) { score = newscore }
  };
  return score
}
function minimize(state) {
  var actions = findlegals(state, library);
  if (actions.length === 0) { return 0 };
  var score = 100;
  for (var i = 0; i < actions.length; i++) {
    var newstate = simulate(actions[i], state, library);
    var newscore = minimax(newstate);
    if (newscore < score) { score = newscore }
  };
  return score
}

function stop (move)
 {return false}

function abort ()
 {return false}
