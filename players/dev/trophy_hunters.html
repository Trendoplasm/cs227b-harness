//==============================================================================

var manager = 'manager';
var player = 'trophy_hunters';

var role = 'robot';
var rules = [];
var startclock = 10;
var playclock = 10;

var library = [];
var roles = [];
var state = [];

//==============================================================================

function ping ()
 {return 'ready'}

function start (r,rs,sc,pc)
 {role = r;
  rules = rs.slice(1);
  startclock = numberize(sc);
  playclock = numberize(pc);
  library = definemorerules([],rules);
  roles = findroles(library);
  state = findinits(library);
  return 'ready'}

function play (move)
 {if (move!==nil) {state = simulate(move,state,library)};
  if (findcontrol(state,library)!==role) {return false};
  return findmaximax(state,library);
}

function findmaximax(state,library) {
    actions = findlegals(state, library);
    var score = 0;
    var best_action = actions[0];
    for(var i = 0; i < actions.length; i++) {
        var action = actions[i];
        var new_state = simulate(action, state, library);
        var new_vector = maximax(new_state);
        if (new_vector[role] === 100) {
            return action;
        }
        if (new_vector[role] > score) {
            score = new_vector[role];
            best_action = action;
        }
    }
    return best_action;
}

function maximax(state) {
    if(findterminalp(state, library)) {
        var rewards = {};
        for(var i = 0; i < roles.length; i++) {
            rewards[roles[i]] = findreward(roles[i], state, library);
        }
        return rewards;
    }
    var active = findcontrol(state, library);
    var actions = findlegals(state, library);
    var rewards = {};
    rewards[active] = 0;
    for (var k = 0; k < roles.length; k++) {
        if (roles[k] !== active) {
            rewards[roles[k]] = 0;
        }
    }
    for(var i = 0; i < actions.length; i++) {
        var action = actions[i];
        var new_state = simulate(action, state, library);
        var new_vector = maximax(new_state);
        if(new_vector[active] < rewards[active]) {
            continue;
        }
        if(new_vector[active] > rewards[active]) {
            rewards = new_vector;
        }
        for (var j = 0; j < roles.length; j++) {
            if(roles[j]!==active) {
                rewards[roles[j]] = Math.min(new_vector[roles[j]], rewards[roles[j]]);
            }
        }
    }
    return rewards;
}

function stop (move)
 {return false}

function abort ()
 {return false}

//==============================================================================
// End of player code
//==============================================================================
  </script>
