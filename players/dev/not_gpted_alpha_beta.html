var manager = 'manager';
var player = 'not_gpted_alpha_beta';

var role = 'robot';
var rules = [];
var startclock = 10;
var playclock = 10;

var library = [];
var roles = [];
var state = [];

//==============================================================================

function ping () {
  return 'ready';
}

function start (r, rs, sc, pc) {
  role = r;
  startclock = numberize(sc);
  playclock = numberize(pc);
  library = definemorerules([], rs.slice(1));
  roles = findroles(library);
  state = findinits(library);
  return 'ready';
}

function bestmove (state) {
  var actions = findlegals(state, library);
  var action = actions[0];
  var score = 0;
  for (var i = 0; i < actions.length; i++) {
    var newstate = simulate(actions[i], state, library);
    var result = minimax(newstate, score, 100);
    if (result == 100) {return actions[i];}
    if (result > score) { score = result; action = actions[i]; }
  }
  return action;
}

function minimax (state, alpha, beta) {
  if (findterminalp(state, library)) {
    return findreward(role, state, library);
  }
  var active = findcontrol(state, library);
  if (active === role) {return maximize(state, alpha, beta);}
  return minimize(state, alpha, beta);
}

function maximize (state, alpha, beta) {
  var actions = findlegals(state, library);
  for (var i = 0; i < actions.length; i++) {
    var newstate = simulate(actions[i], state, library);
    var result = minimax(newstate, alpha, beta);
    alpha = Math.max(alpha, result);
    if (alpha >= beta) return beta;
    if (alpha == 100) return 100;
  }
  return alpha;
}

function minimize (state, alpha, beta) {
  var actions = findlegals(state, library);
  for (var i = 0; i < actions.length; i++) {
    var newstate = simulate(actions[i], state, library);
    var result = minimax(newstate, alpha, beta);
    beta = Math.min(beta, result);
    if (beta <= alpha) return alpha;
    if (beta == 0) return 0;
  }
  return beta;
}

function play (move) {
  if (move !== null) {state = simulate(move, state, library)};
  if (findcontrol(state, library) !== role) {return false};
  return bestmove(state);
}

function stop (move) 
 { return false; }

function abort () 
 { return false; }
