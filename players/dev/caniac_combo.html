// Node creation
function makenode(state, mover, reward, complete) {
    return {
        state: state,
        mover: mover,
        utility: reward,
        visits: 0,
        actions: [],
        children: [],
        charges: 0,
        complete: complete
    };
}

function subtree(move,node) {
    if (node.children.length === 0) {
        var newstate = simulate(move,node.state,library);
        var newmover = findcontrol(newstate,library);
        var newscore = parseInt(findreward(role,newstate,library));
        var newcomplete = findterminalp(newstate,library);
        return makenode(newstate,newmover,newscore,newcomplete);
    }
    for (var i=0; i < node.actions.length; i++) {
        if (equalp(move,node.actions[i])) {
            return node.children[i]
        }
    }
    return node;
}

function processnode(node) {
    if (node.children.length === 0) {
        expand(node);
    }
    else {
        processnode(selectnode(node));
    }
    updatenode(node);
    return true;
}

function selectnode(node) {
    var child = node.children[0];
    var visits = node.visits;
    for (var i=0; i < node.children.length; i++) {
        var newchild = node.children[i];
        if (newchild.complete) {
            continue;
        }
        var newvisits = newchild.visits;
        if (newvisits<visits) {
            child = newchild; 
            visits = newvisits;
        }
    }
    return child;
}

function expand(node) {
    node.actions = shuffle(findlegals(node.state,library));
    for (var i = 0; i < node.actions.length; i++) {
        var newstate = simulate(node.actions[i], node.state, library);
        var newmover = findcontrol(newstate, library);
        var newscore = parseInt(findreward(role, newstate, library));
        var newcomplete = findterminalp(newstate, library);
        node.children[i] = makenode(newstate, newmover, newscore, newcomplete);
        if (newcomplete) {
            terminals++;
        }
        nodes++;
    }
    return true;
}

function updatenode(node) {
    if (node.children.length === 0) {
        // treat as a solved leaf with the current utility
        node.complete = true;
        node.visits  += 1;
        return true;
      }
    node.utility = (node.mover === role) ? scoremax(node) : scoremin(node);
    node.complete = (node.mover === role) ? checkmax(node) : checkmin(node);
    node.visits = node.visits + 1;
    return true;
}

function scoremax(node) {
    var score = node.children[0].utility;
    for (var i = 1; i < node.children.length; i++) {
        var newscore = node.children[i].utility;
        if (newscore > score) {
            score = newscore;
        }
    }
    return score;
}

function scoremin(node) {
    var score = node.children[0].utility;
    for (var i = 1; i < node.children.length; i++) {
        var newscore = node.children[i].utility;
        if (newscore < score) {
            score = newscore;
        }
    }
    return score;
}

function checkmax(node) {
    var flag = true;
    for (var i = 0; i < node.children.length; i++) {
        if (!node.children[i].complete) {
            flag = false; 
            continue;
        }
        if (node.children[i].utility === 100) {
            return true;
        }
    }
    return flag;
}

function checkmin (node){var flag = true;
    for (var i = 0; i < node.children.length; i++) {
        if (!node.children[i].complete) {
            flag = false; 
            continue;
        }
        if (node.children[i].utility === 0) {
            return true;
        }
    }
    return flag;
}

function mctsIteration(node) {
    if (node.children.length === 0) {
        var utility = node.utility;
        var charges = node.charges;
        var result = depthcharge(node.state);
        node.utility = Math.round((utility * charges + result)/(charges + 1));
        node.charges = node.charges + 1;
        depthcharges++;
        return true;
    }
    else {
        mctsIteration(selectbalance(node));
    }
    updatenode(node);
    return true;
}

// Random playout from mcs implementation
function depthcharge(s) {
    if (findterminalp(s, library)) {
        stats.termVisits++;
        return findreward(role, s, library) * 1;
    }
    var actions = findlegals(s, library);
    if (actions.length === 0) {

    }
    var idx = randomindex(actions.length);
    return depthcharge(simulate(actions[idx], s, library));
}


// Selection balancing from pts (UCT-inspired)
function selectbalance(node) {
    var total = node.visits;
    var best = node.children[0];
    var bestScore = value(best.utility, best.visits, total);
    for (var i = 1; i < node.children.length; i++) {
        var c = node.children[i];
        var s = value(c.utility, c.visits, total);
        if (s > bestScore) {
            best = c;
            bestScore = s;
        }
    }
    return best;
}

// UCT-style value function (adapted)
function value(utility, visits, total) {
    var C = 1.8;
    var exploitation = utility / visits;
    var exploration = C * Math.sqrt(Math.log(total) / (visits)); // test exploration function
    return exploitation + exploration;
}


function selectaction(node) {
    var action = node.actions[0];
    var score = -1;
    for (var i = 0; i < node.children.length; i++) {
        var child = node.children[i];
        if (child.complete && child.utility === 100) {
            return node.actions[i];
        }
        if (child.complete && child.utility === 0) {
            continue
        };
        var newscore = safeAvg(child.utility, child.visits);
        if (newscore > score) {
            action = node.actions[i]; 
            score = newscore;
        }
    }
    console.log("action selected");
    return action;
}

// Alternate functions
// Single iteration of Monte Carlo Tree Search
function mctsIterationN(root) {
    var path = [];
    var node = root;
    stats.nodeVisits++;
    path.push(node);
    // Selection
    while (node.children.length > 0 && !findterminalp(node.state, library)) {
        node = selectbalanceN(node);
        stats.nodeVisits++;
        path.push(node);
    }
    // Expansion
    if (!findterminalp(node.state, library)) {
        expandN(node);
        if (node.children.length > 0) {
            node = node.children[randomindex(node.children.length)];
            stats.nodeVisits++;
            path.push(node);
        }
    }
    // Simulation (rollout)
    var result = depthchargeN(node.state);
    // Backpropagation
    for (var i = 0; i < path.length; i++) {
        var n = path[i];
        n.visits = (n.visits || 0) + 1;
        n.utility = (n.utility || 0) + result;
    }
}

// Navigate to subtree corresponding to a move
function subtreeN(move, node) {
    if (node.children.length === 0) {
        expandN(node);
    }
    for (var i = 0; i < node.actions.length; i++) {
        if (equalp(move, node.actions[i])) {
            return node.children[i];
        }
    }
    // If not found, create new node
    var s1 = simulate(move, node.state, library);
    var newMover = findcontrol(s1, library);
    var newReward = findterminalp(s1, library) ? findreward(role, s1, library) * 1 : 0;
    return makenodeN(s1, newMover, newReward);
}

// Expand a node: generate all legal moves and child nodes
function expandN(node) {
    node.actions = findlegals(node.state, library);
    node.children = [];

    }
}

// UCT-style value function (adapted)
function valueN(utility, visits, total) {
    var C = 100;
    var exploitation = visits === 0 ? Infinity : utility / visits;
    var exploration = C * Math.sqrt(Math.log(total + 1) / (visits + 1)); // test exploration function
    return exploitation + exploration;
}

// Select final action based on highest average utility
function selectactionN(node) {
    var bestAction = node.actions[0];
    var bestValue = safeAvg(node.children[0].utility, (node.children[0].visits));
    for (var i = 1; i < node.children.length; i++) {
        var v = safeAvg(node.children[i].utility, node.children[i].visits);
        if (v > bestValue) {
            bestValue = v;
            bestAction = node.actions[i];
        }
    }
    console.log("action selected");
    return bestAction;
}

// looking for losing moves that should be pruned from the tree
function losingMove(state) {
    var currState = state;
    var losingMoves = [];
    var myMoves = findlegals(currState, library);
    for (var i = 0; i < myMoves.length; i++) {
        var move = myMoves[i];
        var nextState = simulate(move, currState, library);
        var oppMoves = findlegals(nextState, library);
        var oppWinMove = null;
        for (var j = 0; j < oppMoves.length; j++) {
            var oppMove = oppMoves[j];
            var oppState = simulate(oppMove, nextState, library);
            // if opponent has a winning move
            if (findterminalp(oppState, library) && findreward(role, oppState, library)*1 === 0) {
                oppWinMove = oppMove;
                break;
            }
        }
        // add move to losing moves if it leads to opponent win
        if (oppWinMove !== null) {
            losingMoves.push(move);
        }

    }
    // if all moves are safe, or all moves unsafe,
    // return null and let mcts take over
    if (losingMoves.length === 0 || losingMoves.length === myMoves.length) {
        return null;
    }
    // else return all losing moves so that they can be pruned
    return losingMoves;
}


function pruneTree(node, losingMoves) {
    // nothing to do if we haven't expanded yet
    if (node.actions.length === 0) {
        expandN(node);
    }
    var newActions = [];
    var newChildren = [];
    // walk in parallel through actions+children
    for (var i = 0; i < node.actions.length; i++) {
        var a = node.actions[i];
        var isLosing = false;
        // check if this action is in the losingMoves list
        for (var j = 0; j < losingMoves.length; j++) {
            if (equalp(a, losingMoves[j])) {
                isLosing = true;
                break;
            }
        }
        // keep only the non‑losing ones
        if (!isLosing) {
            newActions.push(a);
            newChildren.push(node.children[i]);
        }
    }
    // overwrite the root’s arrays
    node.actions = newActions;
    node.children = newChildren;
    // debug
    if (node.actions.length === 0) {
        console.log("all moves are losing moves");
    }
}

// Utility helper
function randomindex(n) {
    return Math.floor(Math.random() * n);
}

function shuffle (array) {
    for (var i = array.length-1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = array[i];
        array[i] = array[j];
        array[j] = temp;
    }
    return array;
}

function safeAvg(util, visits) {
    return visits === 0 ? 0 : util / visits;      // 0 when never visited
}

// Optional: evaluation functions from MCS
function pessimistic_eval(state) {
    if (findterminalp(state, library)) {
        return findreward(role, state, library) * 1;
    }
    return 0;
}

function mobility_eval(state) {
    var curr = findcontrol(state, library);
    var actions = findlegals(state, library);
    var feasible = findactions(library);
    var score = actions.length / feasible.length;
    return (curr === role ? score * 100 : (1 - score) * 100);
}

// reward function that converts to -1, 0, 1
function unitReward(role, state, library) {
  var score = findreward(role, state, library) * 1
  return (score - 50) / 50;
}
