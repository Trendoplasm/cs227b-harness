<!--
  Maximax + alpha-beta pruning player for multiplayer games.
  - Iterative deepening under playclock.
  - Treats all turns as maximizing our score (maximax).
-->

<!--=======================================================================-->

<head>
  <title>bombe_maximax</title>
  <script type='text/javascript' src='/vendor/epilog.js'></script>
  <script type='text/javascript' src='/vendor/localstorage.js'></script>
  <script type='text/javascript' src='/vendor/general.js'></script>
  <script type='text/javascript'>
//==============================================================================
// Maximax + alpha-beta player
//==============================================================================

var manager = 'manager';
var player = 'bombe_maximax';

var role = 'robot';
var rules = [];
var library = [];
var state = [];

var playclock = 10;
var maxDepth = 14;

function ping() {
  return 'ready';
}

function start(r, rs, sc, pc) {
  role = r;
  rules = rs;
  library = definemorerules([], rs.slice(1));
  state = findinits(library);
  playclock = numberize(pc);
  return 'ready';
}

function play(move) {
  if (hasIncomingMove(move)) {
    state = simulate(move, state, library);
  }
  if (findcontrol(state, library) !== role) {
    return false;
  }
  return bestmove(state);
}

function stop(move) {
  return false;
}

function abort() {
  return false;
}

function bestmove(rootState) {
  var actions = findlegals(rootState, library);
  if (actions.length === 0) {
    return false;
  }
  if (actions.length === 1) {
    return actions[0];
  }

  var deadlineMs = Date.now() + computeBudgetMs();
  var ordered = actions.slice(0);
  var bestAction = ordered[0];

  for (var depth = 1; depth <= maxDepth; depth++) {
    if (Date.now() >= deadlineMs) {
      break;
    }
    var result = searchRootAtDepth(rootState, ordered, depth, deadlineMs);
    if (result.timedOut) {
      break;
    }
    bestAction = result.action;
    ordered = moveActionToFront(ordered, bestAction);
    if (result.score === 100) {
      return bestAction;
    }
  }
  return bestAction;
}

function computeBudgetMs() {
  var safetyMs = 350;
  if (playclock <= 6) {
    safetyMs = 600;
  }
  if (playclock <= 3) {
    safetyMs = 900;
  }
  return Math.max(25, (playclock * 1000) - safetyMs);
}

function searchRootAtDepth(rootState, actions, depth, deadlineMs) {
  var bestAction = actions[0];
  var bestScore = -Infinity;
  var alpha = -Infinity;
  var beta = 100;

  for (var i = 0; i < actions.length; i++) {
    if (Date.now() >= deadlineMs) {
      return { action: bestAction, score: bestScore, timedOut: true };
    }
    var nextState = simulate(actions[i], rootState, library);
    var child = maximaxDepth(nextState, depth - 1, alpha, beta, deadlineMs);
    if (child.timedOut) {
      return { action: bestAction, score: bestScore, timedOut: true };
    }
    if (child.score > bestScore) {
      bestScore = child.score;
      bestAction = actions[i];
      alpha = Math.max(alpha, bestScore);
    }
    if (alpha >= beta || bestScore === 100) {
      break;
    }
  }
  return { action: bestAction, score: bestScore, timedOut: false };
}

function maximaxDepth(searchState, depth, alpha, beta, deadlineMs) {
  if (Date.now() >= deadlineMs) {
    return { score: evaluateState(searchState, false), timedOut: true };
  }

  var terminal = findterminalp(searchState, library);
  if (terminal || depth <= 0) {
    return { score: evaluateState(searchState, terminal), timedOut: false };
  }

  var actions = findlegals(searchState, library);
  if (actions.length === 0) {
    return { score: evaluateState(searchState, false), timedOut: false };
  }

  var best = -Infinity;
  for (var i = 0; i < actions.length; i++) {
    if (Date.now() >= deadlineMs) {
      return { score: evaluateState(searchState, false), timedOut: true };
    }
    if (alpha >= beta) {
      break;
    }
    var nextState = simulate(actions[i], searchState, library);
    var child = maximaxDepth(nextState, depth - 1, alpha, beta, deadlineMs);
    if (child.timedOut) {
      return { score: evaluateState(searchState, false), timedOut: true };
    }
    if (child.score > best) {
      best = child.score;
      alpha = Math.max(alpha, best);
    }
    if (best === 100) {
      break;
    }
  }
  return { score: best, timedOut: false };
}

function evaluateState(searchState, isTerminal) {
  if (isTerminal) {
    return safeReward(searchState);
  }
  // Lightweight non-terminal heuristic: our legal mobility.
  var count = findlegals(searchState, library).length;
  var score = 50 + (count * 5);
  if (score > 100) {
    score = 100;
  }
  return score;
}

function safeReward(searchState) {
  try {
    var r = findreward(role, searchState, library);
    if (r === false || r === null || typeof r === 'undefined') {
      return 0;
    }
    var n = Number(r);
    if (isNaN(n)) {
      return 0;
    }
    return n;
  } catch (e) {
    return 0;
  }
}

function hasIncomingMove(move) {
  if (move === nil || move === null || typeof move === 'undefined') {
    return false;
  }
  if (Array.isArray(move) && move.length === 0) {
    return false;
  }
  return true;
}

function moveActionToFront(actions, preferredAction) {
  for (var i = 0; i < actions.length; i++) {
    if (equalp(actions[i], preferredAction)) {
      if (i !== 0) {
        var chosen = actions[i];
        actions.splice(i, 1);
        actions.unshift(chosen);
      }
      return actions;
    }
  }
  return actions;
}
