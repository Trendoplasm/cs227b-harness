var manager = 'manager';
var player = 'flipurflop_minimax_multi';

var role = 'robot';
var rules = [];
var startclock = 10;
var playclock = 10;

var library = [];
var roles = [];
var state = [];

var cur;

var nodes = new Map();

function stateKey(s) {
  return grindem(s);
}

class GraphNode {
  constructor(state) {
    this.state = state;
    this.bestmove = null;
    this.value = -1;
  }

    search() {
    if (findterminalp(this.state, library)) {
        this.value = Number(findreward(role, this.state, library));
        return this.value;
    }

    let moves = findlegals(this.state, library);
    let myTurn = (findcontrol(this.state, library) === role);

    this.value = myTurn ? -Infinity : Infinity;

    for (let move of moves) {
        let nextstate = simulate(move, this.state, library);
        let key = stateKey(nextstate);

        let node = nodes.get(key);
        if (node === undefined) {
        node = new GraphNode(nextstate);
        nodes.set(key, node);
        node.search();
        }

        let nextvalue = Number(node.value);

        if (myTurn) {
        if (nextvalue > this.value) {
            this.value = nextvalue;
            this.bestmove = move;
        }
        } else {
        if (nextvalue < this.value) {
            this.value = nextvalue;
            this.bestmove = move;
        }
        }
    }

    return this.value;
    }
}

//==============================================================================

function ping ()
 {return 'ready'}

function start (r,rs,sc,pc)
 {role = r;
  rules = rs.slice(1);
  startclock = numberize(sc);
  playclock = numberize(pc);
  library = definemorerules([],rules);
  roles = findroles(library);
  state = findinits(library);
  cur = new GraphNode(state);
  nodes.set(stateKey(state), cur);
  cur.search();
  return 'ready'}

function play (move)
 {if (move!==nil) {state = simulate(move,state,library)};
  if (findcontrol(state,library)!==role) {return false};
  return nodes.get(stateKey(state)).bestmove}

function stop (move)
 {
  if (move!==nil) {state = simulate(move,state,library)};
  return false
 }

function abort ()
 {return false}

//==============================================================================
// End of player code
//==============================================================================
