var manager = 'manager';
var player = 'depth_first_demons';
var role = 'robot';
var rules = [];
var startclock = 10;
var playclock = 10;

var library = [];
var roles = [];
var state = [];

//==============================================================================

function ping ()
 {return 'ready'}

function start (r,rs,sc,pc)
 {role = r;
  rules = rs.slice(1);
  startclock = numberize(sc);
  playclock = numberize(pc);
  library = definemorerules([],rs.slice(1));
  roles = findroles(library);
  state = findinits(library);
  return 'ready'}

function play (move)
 {if (move!==nil && move.length!=0) {state = simulate(move,state,library)};
  if (findcontrol(state,library)!==role) {return false};
  return bestmove(state)}

function stop (move)
 {return false}

function abort ()
 {return false}

//==============================================================================
// minimax, just maximizer for single player games. 
//==============================================================================

var nodes = 0;
var terminals = 0;
var elapsed = 0;

function bestmove (state)
 {var actions = findlegals(state,library);
  if (actions.length===0) {return false};
  if (actions.length===1) {return actions[0]};

  var action = actions[0];
  var score = 0;
  nodes = 0;
  terminals = 0;

  for (var i=0; i<actions.length; i++)
    {var newstate = simulate(actions[i],state,library);
     var newscore = maxscore(newstate);
     if (newscore===100) {return actions[i]};
     if (newscore>score)
        {score = newscore;
         action = actions[i]}};
return action}

function testmaxscore (state)
 {nodes = 0;
  terminals = 0;
  var beg = performance.now();
  var result = maxscore(state);
  var end = performance.now();
  elapsed = Math.round(end-beg);
  return result}

function maxscore (state)
 {nodes = nodes + 1;
  if (findterminalp(state,library))
     {terminals = terminals + 1;
      return findreward(role,state,library)*1};

  var actions = findlegals(state,library);
  if (actions.length===0) {return 0};

  var score = 0;
  for (var i=0; i<actions.length; i++)
      {var newstate = simulate(actions[i],state,library);
       var newscore = maxscore(newstate);
       if (newscore===100) {return 100};
       if (newscore>score) {score = newscore}};
  return score}

//==============================================================================
// End of player code
