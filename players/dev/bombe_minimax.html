<!--
  Generic minimax player for single-player and multiplayer GGP games.
  - Uses one minimax path for all modes:
      * Our turn => maximize
      * Any other role's turn => minimize
  - Uses iterative deepening with a time deadline from playclock.
-->

<!--=======================================================================-->

<head>
  <title>bombe_minimax</title>
  <script type='text/javascript' src='/vendor/epilog.js'></script>
  <script type='text/javascript' src='/vendor/localstorage.js'></script>
  <script type='text/javascript' src='/vendor/general.js'></script>
  <script type='text/javascript'>
//==============================================================================
// Minimax player (single + multiplayer)
//==============================================================================

var manager = 'manager';
var player = 'minimax_multi_single';

var role = 'robot';
var rules = [];
var library = [];
var state = [];

var startclock = 10;
var playclock = 10;
var maxDepth = 12;

function ping() {
  return 'ready';
}

function start(r, rs, sc, pc) {
  role = r;
  rules = rs;
  library = definemorerules([], rs.slice(1));
  state = findinits(library);
  startclock = numberize(sc);
  playclock = numberize(pc);
  return 'ready';
}

function play(move) {
  if (hasIncomingMove(move)) {
    state = simulate(move, state, library);
  }
  if (findcontrol(state, library) !== role) {
    return false;
  }
  return bestmove(state);
}

function stop(move) {
  return false;
}

function abort() {
  return false;
}

//==============================================================================
// Move selection
//==============================================================================

function bestmove(rootState) {
  var actions = findlegals(rootState, library);
  if (actions.length === 0) {
    return false;
  }
  if (actions.length === 1) {
    return actions[0];
  }

  var deadlineMs = Date.now() + computeBudgetMs();
  var orderedActions = actions.slice(0);
  var bestAction = orderedActions[0];

  for (var depth = 1; depth <= maxDepth; depth++) {
    if (Date.now() >= deadlineMs) {
      break;
    }
    var result = searchRootAtDepth(rootState, orderedActions, depth, deadlineMs);
    if (result.timedOut) {
      break;
    }
    bestAction = result.action;
    orderedActions = moveActionToFront(orderedActions, bestAction);
    if (result.score === 100) {
      return bestAction;
    }
  }
  return bestAction;
}

function computeBudgetMs() {
  var safetyMs = 350;
  if (playclock <= 6) {
    safetyMs = 600;
  }
  if (playclock <= 3) {
    safetyMs = 900;
  }
  var budget = (playclock * 1000) - safetyMs;
  return Math.max(25, budget);
}

function searchRootAtDepth(rootState, actions, depth, deadlineMs) {
  var bestAction = actions[0];
  var bestScore = -Infinity;
  var alpha = -Infinity;
  var beta = Infinity;

  for (var i = 0; i < actions.length; i++) {
    if (Date.now() >= deadlineMs) {
      return { action: bestAction, score: bestScore, timedOut: true };
    }
    var nextState = simulate(actions[i], rootState, library);
    var child = minimaxDepth(nextState, depth - 1, alpha, beta, deadlineMs);
    if (child.timedOut) {
      return { action: bestAction, score: bestScore, timedOut: true };
    }
    if (child.score > bestScore) {
      bestScore = child.score;
      bestAction = actions[i];
    }
    alpha = Math.max(alpha, bestScore);
    if (alpha >= beta || bestScore === 100) {
      break;
    }
  }

  return { action: bestAction, score: bestScore, timedOut: false };
}

//==============================================================================
// Minimax core
//==============================================================================

function minimaxDepth(searchState, depth, alpha, beta, deadlineMs) {
  if (Date.now() >= deadlineMs) {
    return { score: evaluateState(searchState, false), timedOut: true };
  }

  var isTerminal = findterminalp(searchState, library);
  if (isTerminal || depth <= 0) {
    return { score: evaluateState(searchState, isTerminal), timedOut: false };
  }

  var actions = findlegals(searchState, library);
  if (actions.length === 0) {
    return { score: evaluateState(searchState, false), timedOut: false };
  }

  var toMove = findcontrol(searchState, library);
  var maximizing = (toMove === role);
  var best = maximizing ? -Infinity : Infinity;

  for (var i = 0; i < actions.length; i++) {
    if (Date.now() >= deadlineMs) {
      return { score: evaluateState(searchState, false), timedOut: true };
    }
    var nextState = simulate(actions[i], searchState, library);
    var child = minimaxDepth(nextState, depth - 1, alpha, beta, deadlineMs);
    if (child.timedOut) {
      return { score: evaluateState(searchState, false), timedOut: true };
    }

    if (maximizing) {
      if (child.score > best) {
        best = child.score;
      }
      alpha = Math.max(alpha, best);
    } else {
      if (child.score < best) {
        best = child.score;
      }
      beta = Math.min(beta, best);
    }
    if (alpha >= beta) {
      break;
    }
  }
  return { score: best, timedOut: false };
}

//==============================================================================
// Evaluation
//==============================================================================

function evaluateState(searchState, isTerminal) {
  if (isTerminal) {
    return safeReward(searchState);
  }

  // Non-terminal fallback heuristic:
  // mobility for side-to-move, signed from our perspective.
  var sideToMove = findcontrol(searchState, library);
  var legalCount = findlegals(searchState, library).length;
  var signed = (sideToMove === role) ? legalCount : -legalCount;

  // Bound roughly to [0, 100] for stable minimax behavior.
  var score = 50 + (signed * 5);
  if (score < 0) {
    score = 0;
  }
  if (score > 100) {
    score = 100;
  }
  return score;
}

function safeReward(searchState) {
  try {
    var r = findreward(role, searchState, library);
    if (r === false || r === null || typeof r === 'undefined') {
      return 0;
    }
    var n = Number(r);
    if (isNaN(n)) {
      return 0;
    }
    return n;
  } catch (e) {
    return 0;
  }
}

//==============================================================================
// Utility helpers
//==============================================================================

function hasIncomingMove(move) {
  if (move === nil || move === null || typeof move === 'undefined') {
    return false;
  }
  if (Array.isArray(move) && move.length === 0) {
    return false;
  }
  return true;
}

function moveActionToFront(actions, preferredAction) {
  for (var i = 0; i < actions.length; i++) {
    if (equalp(actions[i], preferredAction)) {
      if (i !== 0) {
        var chosen = actions[i];
        actions.splice(i, 1);
        actions.unshift(chosen);
      }
      return actions;
    }
  }
  return actions;
}
