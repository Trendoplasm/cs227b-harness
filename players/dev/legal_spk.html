function ping ()
 {return 'ready'}

 	
function start (id,player,rules,sc,pc)
 {game = rules;
  role = player;
  roles = findroles(game);
  state = findinits(game);
  startclock = sc;
  playclock = pc;
  return 'ready'}

function play (id,move)
 {state = simulate(move,state);
  if (findcontrol(state,library)!==role) {return false};
  return bestmove(role,state)}

function stop (move)
 {return false}

function abort ()
 {return false}

 	
function bestmove (role,state)
 {var actions = findlegals(role,state,game);
  var action = actions[0];
  var score = 0;
  for (var i=0; i<actions.length; i++)
      {var newstate = findnext(actions[i], state, game);
      var result = get_score(role, newstate);
       if (result>score) {score = result; action = actions[i]}};
  return action}

function get_score (role, state) {
    if (findterminalp(state, game)) {
        return findreward(role, state, game);
    }
    
    var active_role = get_control(state);
    var actions = findlegals(active_role, state, game);
    
    if (active_role === role) {
        var score = 0;
        for (var i = 0; i < actions.length; i++) {
            var newstate = findnext(actions[i], state, game);
            var result = get_score(role, newstate);
            if (result > score) score = result;
        }
        return score;
    } else {
        var score = 100;
        for (var i = 0; i < actions.length; i++) {
            var newstate = findnext(actions[i], state, game);
            var result = get_score(role, newstate);
            if (result < score) score = result;
        }
        return score;
    }
}
