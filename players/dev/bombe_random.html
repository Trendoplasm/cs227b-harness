<!--
  Basic random player for single-player and multiplayer GGP games.
  - Updates internal state from each incoming joint move.
  - When it is our turn, returns a random legal action.
  - No search or evaluation.
-->

<!--=======================================================================-->

<head>
  <title>bombe_random</title>
  <script type='text/javascript' src='/vendor/epilog.js'></script>
  <script type='text/javascript' src='/vendor/localstorage.js'></script>
  <script type='text/javascript' src='/vendor/general.js'></script>
  <script type='text/javascript'>
//==============================================================================
// Basic random player
//==============================================================================

var manager = 'manager';
var player = 'bombe_random';

var role = 'robot';
var rules = [];
var library = [];
var state = [];

function ping() {
  return 'ready';
}

function start(r, rs, sc, pc) {
  role = r;
  rules = rs;
  library = definemorerules([], rs.slice(1));
  state = findinits(library);
  return 'ready';
}

function play(move) {
  if (hasIncomingMove(move)) {
    state = simulate(move, state, library);
  }
  if (findcontrol(state, library) !== role) {
    return false;
  }
  return selectRandomMove(state);
}

function stop(move) {
  return false;
}

function abort() {
  return false;
}

function selectRandomMove(searchState) {
  var actions = findlegals(searchState, library);
  if (actions.length === 0) {
    return false;
  }
  // Basic random behavior: choose uniformly from legal actions.
  var i = Math.floor(Math.random() * actions.length);
  return actions[i];
}

function hasIncomingMove(move) {
  if (move === nil || move === null || typeof move === 'undefined') {
    return false;
  }
  if (Array.isArray(move) && move.length === 0) {
    return false;
  }
  return true;
}
  </script>
</head>
