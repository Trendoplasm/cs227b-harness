<!--
  On each play(), apply the last message with simulate. If control is not us,
  return false. Otherwise reset nodesExplored, set searchDeadline to about one
  playclock second from now (minus 300 ms slack), and return bestmove(role, state).

  bestmove() keeps the first legal move as a fallback, then for maxDepth = 1, 2,
  ... re-scores every top-level legal with minscore(..., -Infinity, +Infinity,
  maxDepth). Each finished pass can replace the move if the score improves; a
  timeout or null from maxscore aborts that pass without updating, so the last
  good depth wins.

  maxscore() always optimizes findreward for the match role (the role argument),
  not the side currently to move. It reads findcontrol to branch: our plies use
  minscore (alpha tightens, prune returns beta); opponent plies simulate each
  legal, recurse with depthLeft-1, tighten beta, prune returns alpha. Terminal
  states use findreward; depthLeft hit at a nonterminal returns 50; each such
  inner node increments nodesExplored once. minscore() is only simulate(my
  action) then maxscore on the child with the same depthLeft.
-->

<head>
  <title>verynice_alphabeta</title>
  <script type='text/javascript' src='/vendor/epilog.js'></script>
  <script type='text/javascript' src='/vendor/localstorage.js'></script>

  <script type='text/javascript'>
//==============================================================================
// alphabeta search
//==============================================================================

var manager = 'manager';
var player = 'verynice_alphabeta';

var role = 'robot';
var rules = [];
var startclock = 10;
var playclock = 10;

var library = [];
var game = [];
var roles = [];
var state = [];

var nodesExplored = 0;

var searchDeadline = 0;

//==============================================================================

function ping ()
 {return 'ready'}

function start (r,rs,sc,pc)
 {role = r;
  rules = rs.slice(1);
  startclock = numberize(sc);
  playclock = numberize(pc);
  library = definemorerules([],rules);
  game = library;
  roles = findroles(library);
  state = findinits(library);
  return 'ready'}

//------------------------------------------------------------------------------

function minscore (role, action, state, alpha, beta, depthLeft)
 {return maxscore(role, simulate(action, state, game), alpha, beta, depthLeft)}

function maxscore (role, state, alpha, beta, depthLeft)
 {if (Date.now() >= searchDeadline) {return null};
  if (findterminalp(state, game)) {return numberize(findreward(role, state, game))};
  if (depthLeft <= 0) {return 50};
  nodesExplored++;
  var moves = findlegals(state, game);
  if (!moves || moves.length === 0) {return numberize(findreward(role, state, game))};
  var c = findcontrol(state, game);
  var i;
  if (c === role)
   {for (i = 0; i < moves.length; i++)
     {var result = minscore(role, moves[i], state, alpha, beta, depthLeft);
      if (result === null) {return null};
      alpha = Math.max(alpha, result);
      if (alpha >= beta) {return beta}};
    return alpha}
  for (i = 0; i < moves.length; i++)
   {var result = maxscore(role, simulate(moves[i], state, game), alpha, beta, depthLeft - 1);
    if (result === null) {return null};
    beta = Math.min(beta, result);
    if (beta <= alpha) {return alpha}};
  return beta}

function bestmove (role, state)
 {var actions = findlegals(state, game);
  if (!actions || actions.length === 0) {return findlegalx(state, game)};
  var action = actions[0];
  var negInf = -Infinity;
  var posInf = Infinity;
  var maxDepth;
  for (maxDepth = 1; maxDepth < 1000; maxDepth++)
   {if (Date.now() >= searchDeadline) {break};
    var iterBest = null;
    var iterScore = -Infinity;
    var aborted = false;
    for (var i = 0; i < actions.length; i++)
     {if (Date.now() >= searchDeadline) {aborted = true; break};
      var result = minscore(role, actions[i], state, negInf, posInf, maxDepth);
      if (result === null) {aborted = true; break};
      if (result > iterScore) {iterScore = result; iterBest = actions[i]}};
    if (!aborted && iterBest !== null) {action = iterBest};
    if (Date.now() >= searchDeadline) {break}};
  return action}

function play (move)
 {if (move!==nil) {state = simulate(move,state,library)};
  if (findcontrol(state,library)!==role) {return false};
  nodesExplored = 0;
  searchDeadline = Date.now() + playclock * 1000 - 300;
  return bestmove(role, state)}

function stop (move)
 {var ta = document.getElementById('transcript');
  if (ta)
   {ta.value = ta.value + '\nalphabeta nodes explored (last play): ' + nodesExplored};
  return false}

function abort ()
 {return false}

//==============================================================================
  </script>
