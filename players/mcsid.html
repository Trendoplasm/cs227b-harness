//==============================================================================
// Customization

var manager = 'manager';
var player = 'mcs';

//==============================================================================
// mcs.js
//==============================================================================

var role = 'robot';
var rules = [];
var startclock = 10;
var playclock = 10;

var library = [];
var roles = [];
var state = [];

//==============================================================================

function ping ()
 {return 'ready'}

function start (r,rs,sc,pc)
 {role = r;
  rules = rs.slice(1);
  startclock = numberize(sc);
  playclock = numberize(pc);
  library = definemorerules([],rs.slice(1));
  roles = findroles(library);
  //state = findinits(library);
  definefacts(state,findinits(library));
  return 'ready'}

function play (move)
 {if (move!==nil) {state = simulate(move,state,library)};
  if (findcontrol(state,library)!==role) {return false};
  return playmcs(role)}

function stop (move)
 {return false}

function abort ()
 {return false}

//==============================================================================
// mcs
//==============================================================================

var depthcharges = 0;

function playmcs (role)
 {depthcharges = 0;
  var deadline = Date.now()+Math.floor(playclock-2)*1000;
  //var actions = shuffle(findlegals(state,library));
  var actions = findlegals(state,library);
  if (actions.length===0) {return false};
  if (actions.length===1) {return actions[0]};
  var scores = [];
  var visits = [];
  for (var i=0; i<actions.length; i++) {scores[i] = 0; visits[i] = 0};
  explore(actions,scores,visits,deadline);
  var move = selectaction(actions,scores,visits);
  return move}

function shuffle (array)
 {for (var i = array.length-1; i>0; i--)
      {var j = Math.floor(Math.random() * (i + 1));
       var temp = array[i];
       array[i] = array[j];
       array[j] = temp};
  return array}

//==============================================================================

function explore (actions,scores,visits,deadline)
 {var index = 0;
  while (Date.now()<deadline)
   {if (index>=actions.length) {index = 0};
    var copy = definemorefacts([],state);
    dataindexing = true;
    var result = depthcharge(copy);
    dataindexing = false;
    scores[index] = scores[index] + result;
    visits[index] = visits[index] + 1;
    depthcharges++; index++};
  return true}

//==============================================================================

function depthcharge (state)
 {if (findterminalp(state,library)) {return findreward(role,state,library)*1};
  var actions = findlegals(state,library);
  if (actions.length===0) {console.log(state); return 0};
  var best = randomindex(actions.length);
  compexecute(actions[best],state,library);
  return depthcharge(state)}

function randomindex (n)
 {return Math.floor(Math.random()*n)}

function randomindex (n)
 {return 0}

//==============================================================================

function selectaction (actions,scores,visits)
 {var action = actions[0];
  var score = -1;
  var probes = 0;
  for (var i=0; i<actions.length; i++)
      {var newscore = Math.round(scores[i]/visits[i]);
       if (newscore===100)
          {action = actions[i]; score=100; probes = visits[i]; break};
       if (newscore>score)
          {action = actions[i]; score = newscore; probes = visits[i]}};

  console.log("Probes: " + depthcharges);
  console.log("Utility: " + score);
  console.log("Visits: " + probes);
  console.log("Move: " + grind(action));
  console.log("");

  return action}

//==============================================================================
// End of mcs.js
//==============================================================================
//==============================================================================
// general.js
//==============================================================================
//==============================================================================
// Initialization
//==============================================================================

indexing = false;
dataindexing = true;
ruleindexing = true;

//==============================================================================
// Basics
//==============================================================================

function findroles (rules)
 {return compfinds('R',seq('role','R'),seq(),rules)}

function findbases (rules)
 {return compfinds('P',seq('base','P'),seq(),rules)}

function findactions (rules)
 {return compfinds('A',seq('action','A'),seq(),rules)}

function findinits (rules)
 {return compfinds('P',seq('init','P'),seq(),rules)}

function findcontrol (facts,rules)
 {return compfindx('X',seq('control','X'),facts,rules)}

function findlegalp (move,facts,rules)
 {return compfindp(seq('legal',move),facts,rules)}

function findlegalx (facts,rules)
 {return compfindx('X',seq('legal','X'),facts,rules)}

function findlegals (facts,rules)
 {return compfinds('X',seq('legal','X'),facts,rules)}

function findreward (role,facts,rules)
 {var value = compfindx('R',seq('goal',role,'R'),facts,rules);
  if (value) {return value};
  return "0"}

function findterminalp (facts,rules)
 {return compfindp('terminal',facts,rules)}

//------------------------------------------------------------------------------

function simulate (move,state,rules)
 {compexecute(move,state,rules);
  return state}

//==============================================================================
// End of general.js
//==============================================================================  </script>
